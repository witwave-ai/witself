name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: witself
          POSTGRES_PASSWORD: witself
          POSTGRES_DB: witself
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U witself -d witself"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Keep the production-backed store tests in the normal CI gate. Without
      # this DSN they intentionally skip, which can hide PostgreSQL semantics.
      WITSELF_TEST_DATABASE_URL: postgres://witself:witself@localhost:5432/witself?sslmode=disable
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            infra/pulumi/go.sum

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./... -race -timeout=20m

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...

      # infra/pulumi is a NESTED module: ./... from the repo root never
      # descends into it, so without this step its tests run nowhere.
      - name: infra module gates
        run: |
          cd infra/pulumi
          go vet ./...
          go build ./...
          go test ./...
          golangci-lint run ./...

      - name: Cloudflare agent-email Worker gates
        run: npm --prefix infra/cloudflare/agent-email test

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pin both the action wrapper and the binary: release configuration is a
      # production interface, so upgrades should arrive as reviewed changes.
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      - name: Validate GoReleaser configuration
        run: goreleaser check

      - name: Validate derived Witself CLI smoke configuration
        run: |
          scripts/render-goreleaser-witself-smoke-config.sh "$RUNNER_TEMP/goreleaser-witself-smoke.yaml" .goreleaser.yaml
          goreleaser check -f "$RUNNER_TEMP/goreleaser-witself-smoke.yaml"

      - name: Test Homebrew tap publisher
        run: bash scripts/test-publish-homebrew-formulas.sh

      - name: Test GHCR latest reconciliation
        run: bash scripts/test-promote-latest-images.sh

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Pin and run ShellCheck and actionlint
        run: bash scripts/test-ci-static-analysis.sh

  homebrew-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Render and audit Homebrew formulae
        run: bash scripts/test-homebrew-formulas.sh

  # Prove the provider installation transaction on every native platform we
  # advertise. These tests use a portable fake runtime and disposable homes;
  # they need no vendor account and never touch a developer's real profile.
  # Real-client/model acceptance is a separate scheduled or manual release
  # gate documented in docs/provider-integration-certification.md.
  provider-integration-contract:
    name: provider integration / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: macos-intel
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: windows-x64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Record native target
        run: go env GOOS GOARCH

      - name: Build native Witself client
        run: go build ./cmd/witself

      - name: Install GoReleaser for exact client artifact gate
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      - name: Derive CLI-only smoke config from release config
        shell: bash
        run: >-
          scripts/render-goreleaser-witself-smoke-config.sh
          "$RUNNER_TEMP/goreleaser-witself-smoke.yaml"
          .goreleaser.yaml

      - name: Build exact GoReleaser Unix archive and checksums
        if: runner.os != 'Windows'
        shell: bash
        run: |
          goreleaser release \
            --config "$RUNNER_TEMP/goreleaser-witself-smoke.yaml" \
            --snapshot \
            --clean \
            --skip=before,sign,sbom,docker \
            --parallelism 1 \
            --timeout 30m

      - name: Build exact GoReleaser Windows archive
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $config = Join-Path $env:RUNNER_TEMP 'goreleaser-witself-smoke.yaml'
          & goreleaser release --config $config --snapshot --clean '--skip=before,sign,sbom,docker' --parallelism 1 --timeout 30m
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Universal installer artifact smoke
        if: runner.os != 'Windows'
        env:
          WITSELF_INSTALL_SMOKE_GORELEASER_DIST: ${{ github.workspace }}/dist
          WITSELF_INSTALL_SMOKE_OUTPUT: ${{ runner.temp }}/witself-installed
        run: bash scripts/test-install-unix.sh

      - name: Windows binary installer smoke
        if: runner.os == 'Windows'
        shell: powershell
        run: >-
          .\scripts\test-install-windows.ps1
          -GoReleaserDist .\dist
          -InstalledBinaryOutput "$env:RUNNER_TEMP\witself-installed.exe"

      - name: PowerShell static analysis
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\test-powershell-static-analysis.ps1

      - name: Native platform safety primitives
        run: >-
          go test
          ./internal/local
          ./internal/memorycurator
          ./internal/dashboard
          ./internal/transcriptcapture
          -run '^(TestLocalLockFile|TestAutoLockPlatform|TestAutoLockIdentity|TestRegistryClaimLock|TestPIDRunning|TestCapturePlatform|TestReplaceFileAtomic)'
          -count=1

      - name: Managed instruction platform primitives
        run: >-
          go test ./cmd/witself
          -run '^(TestManagedInstructionExchangePrimitive|TestManagedInstructionNoReplacePrimitive|TestWindowsManagedInstruction)'
          -count=1

      - name: Codex Windows hook contract
        run: >-
          go test ./internal/transcriptcapture
          -run '^TestCodexHooksWindows'
          -count=1

      - name: Codex provider installation contract
        run: >-
          go test ./cmd/witself
          -run '^(TestProviderIntegrationContractCodex|TestProviderIntegrationContractCodexRollbackRestoresPriorInstall)$'
          -count=1

      - name: Credential-free provider lifecycle contracts
        run: >-
          go test ./cmd/witself
          -run '^TestProviderIntegrationContract(Claude|Grok|Cursor|OpenClaw|Antigravity|Copilot)$'
          -count=1

      - name: Installed release binary provider acceptance
        if: runner.os != 'Windows'
        env:
          WITSELF_INSTALLED_COMMAND_ACCEPTANCE_BINARY: ${{ runner.temp }}/witself-installed
        run: >-
          go test ./cmd/witself
          -run '^(TestProviderIntegrationContractCodexInstalledCommandMCPStdio|TestProviderIntegrationContract(Claude|Grok|Cursor|OpenClaw|Antigravity|Copilot))$'
          -count=1

      - name: Installed release binary provider acceptance
        if: runner.os == 'Windows'
        env:
          WITSELF_INSTALLED_COMMAND_ACCEPTANCE_BINARY: ${{ runner.temp }}\witself-installed.exe
        run: >-
          go test ./cmd/witself
          -run '^(TestProviderIntegrationContractCodexInstalledCommandMCPStdio|TestProviderIntegrationContract(Claude|Grok|Cursor|OpenClaw|Antigravity|Copilot))$'
          -count=1

  avatar-renderer-portability:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: renderer architecture
        run: go env GOOS GOARCH

      - name: avatar renderer portability goldens
        run: >-
          go test ./internal/avatar
          -run
          '^TestPerceptual(V1PolicyGolden|Continuity.*Golden.*|ContinuityFingerprintSpeciesAndPlaceholderBehavior)$'
          -count=1

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: install kubeconform
        env:
          KUBECONFORM_VERSION: v0.8.0
          KUBECONFORM_LINUX_AMD64_SHA256: 9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883
        run: |
          curl -fsSLO "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_LINUX_AMD64_SHA256}  kubeconform-linux-amd64.tar.gz" | sha256sum -c -
          tar -xzf kubeconform-linux-amd64.tar.gz
          sudo install kubeconform /usr/local/bin/

      - name: helm lint
        run: |
          helm lint .gitops/charts/apps
          helm lint charts/witself-server
          helm lint charts/witself-server --values charts/witself-server/ci/cloud-values.yaml
          helm lint charts/witself-server --values charts/witself-server/ci/gcp-rollout-values.yaml

      - name: rollout rendering checks
        run: bash scripts/test-helm-rollout.sh

      - name: helm template + kubeconform
        run: |
          for v in "" "ci/self-hosted-values.yaml" "ci/cloud-values.yaml" "ci/gcp-rollout-values.yaml"; do
            args=(); label=default
            if [ -n "$v" ]; then args=(--values "charts/witself-server/$v"); label="$v"; fi
            echo "::group::$label"
            helm template r charts/witself-server "${args[@]}" -n witself | kubeconform -strict -ignore-missing-schemas -summary
            echo "::endgroup::"
          done

# Witself continuous integration.
#
# Runs on pull requests and pushes to main. Default permissions are read-only and
# superseded runs are cancelled via the concurrency group. Most jobs guard on the
# presence of the artifacts they check (go.mod, images/*, charts/*,
# infra/terraform) so this workflow stays green on the current skeleton and
# automatically begins enforcing each check once that content lands.
#
# See docs/scaffold-readiness.md (CI And Release Workflows) and
# docs/release-and-build.md (Expected Checks). CI tool versions are expected to
# evolve during implementation.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Minimal, read-only default permissions. Individual jobs may not need even this.
permissions:
  contents: read

# Cancel superseded runs on the same ref so stale CI does not linger.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.x"

jobs:
  # Detect which parts of the repository exist yet so language- and
  # artifact-specific jobs can no-op cleanly on the skeleton.
  detect:
    name: Detect surfaces
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
      images: ${{ steps.check.outputs.images }}
      charts: ${{ steps.check.outputs.charts }}
      terraform: ${{ steps.check.outputs.terraform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for surfaces
        id: check
        run: |
          set -euo pipefail
          if [ -f go.mod ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi
          if compgen -G "images/*/Dockerfile" > /dev/null; then
            echo "images=true" >> "$GITHUB_OUTPUT"
          else
            echo "images=false" >> "$GITHUB_OUTPUT"
          fi
          if compgen -G "charts/*/Chart.yaml" > /dev/null; then
            echo "charts=true" >> "$GITHUB_OUTPUT"
          else
            echo "charts=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -d infra/terraform ]; then
            echo "terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "terraform=false" >> "$GITHUB_OUTPUT"
          fi

  gofmt:
    name: gofmt
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: gofmt cleanliness
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            echo "Run: gofmt -w ."
            exit 1
          fi

  mod:
    name: go mod tidy/verify
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: go mod tidy cleanliness
        run: |
          set -euo pipefail
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod/go.sum are not tidy. Run: go mod tidy"
            exit 1
          fi

      - name: go mod verify
        run: go mod verify

  build:
    name: go build
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: go build
        run: go build ./...

  test:
    name: go test -race (linux)
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: go test -race
        run: go test -race ./...

  vet:
    name: go vet
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: go vet
        run: go vet ./...

  golangci-lint:
    name: golangci-lint
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  govulncheck:
    name: govulncheck
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Run govulncheck
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !LICENSE

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: shellcheck
        run: |
          set -euo pipefail
          scripts="$(grep -rIlE '^#!.*\b(sh|bash)\b' --include='*.sh' . || true)"
          extra="$(find . -type f -name '*.bash' || true)"
          targets="$(printf '%s\n%s\n' "$scripts" "$extra" | sort -u | sed '/^$/d')"
          if [ -z "$targets" ]; then
            echo "No shell scripts found yet; skipping shellcheck."
            exit 0
          fi
          echo "Linting:"
          echo "$targets"
          # shellcheck disable=SC2086
          shellcheck $targets

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        uses: raven-actions/actionlint@v2

  hadolint:
    name: hadolint
    needs: detect
    if: needs.detect.outputs.images == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: hadolint
        run: |
          set -euo pipefail
          docker run --rm -i hadolint/hadolint hadolint - < /dev/null || true
          status=0
          while IFS= read -r dockerfile; do
            echo "::group::hadolint ${dockerfile}"
            if ! docker run --rm -i hadolint/hadolint hadolint - < "${dockerfile}"; then
              status=1
            fi
            echo "::endgroup::"
          done < <(find images -type f -name Dockerfile)
          exit "${status}"

  docker-build-smoke:
    name: docker build smoke (images/*)
    needs: detect
    if: needs.detect.outputs.images == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (no push)
        run: |
          set -euo pipefail
          while IFS= read -r dockerfile; do
            dir="$(dirname "${dockerfile}")"
            name="$(basename "${dir}")"
            echo "::group::docker build ${name}"
            docker build -f "${dockerfile}" -t "witself/${name}:ci" .
            echo "::endgroup::"
          done < <(find images -type f -name Dockerfile)

  helm:
    name: helm lint/template (charts/*)
    needs: detect
    if: needs.detect.outputs.charts == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: helm lint and template
        run: |
          set -euo pipefail
          while IFS= read -r chart; do
            dir="$(dirname "${chart}")"
            echo "::group::helm lint ${dir}"
            helm lint "${dir}"
            echo "::endgroup::"
            echo "::group::helm template ${dir}"
            helm template "${dir}"
            echo "::endgroup::"
          done < <(find charts -type f -name Chart.yaml)

  terraform:
    name: terraform fmt/validate
    needs: detect
    if: needs.detect.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: terraform fmt
        run: terraform fmt -check -recursive infra/terraform

      - name: terraform validate
        run: |
          set -euo pipefail
          while IFS= read -r dir; do
            if compgen -G "${dir}/*.tf" > /dev/null; then
              echo "::group::terraform validate ${dir}"
              terraform -chdir="${dir}" init -backend=false -input=false
              terraform -chdir="${dir}" validate
              echo "::endgroup::"
            fi
          done < <(find infra/terraform -type d)

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true # root module cache; infra/pulumi is released separately

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./... -race

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar -xz
          sudo install kubeconform /usr/local/bin/

      - name: helm lint
        run: |
          helm lint charts/witself-server
          helm lint charts/witself-server --values charts/witself-server/ci/cloud-values.yaml

      - name: helm template + kubeconform
        run: |
          for v in "" "ci/self-hosted-values.yaml" "ci/cloud-values.yaml"; do
            args=(); label=default
            if [ -n "$v" ]; then args=(--values "charts/witself-server/$v"); label="$v"; fi
            echo "::group::$label"
            helm template r charts/witself-server "${args[@]}" -n witself | kubeconform -strict -ignore-missing-schemas -summary
            echo "::endgroup::"
          done

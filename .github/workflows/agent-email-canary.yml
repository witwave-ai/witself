name: agent-email-canary

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: agent-email-canary
  cancel-in-progress: false

jobs:
  receive-canary:
    # A manual dispatch is the pre-enable acceptance drill. Scheduled runs
    # remain inert until the repository variable is explicitly enabled.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.AGENT_EMAIL_CANARY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: agent-email-canary
    timeout-minutes: 15
    defaults:
      run:
        working-directory: infra/cloudflare/agent-email
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: npm test
      - name: Run receive and processing canary
        run: npm run canary
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.AGENT_EMAIL_CANARY_CLOUDFLARE_TOKEN }}
          AGENT_EMAIL_CANARY_FROM: ${{ secrets.AGENT_EMAIL_CANARY_FROM }}
          AGENT_EMAIL_CANARY_TO: ${{ secrets.AGENT_EMAIL_CANARY_TO }}
          WITSELF_EMAIL_CANARY_ENDPOINT: ${{ vars.WITSELF_EMAIL_CANARY_ENDPOINT }}
          WITSELF_EMAIL_CANARY_TOKEN: ${{ secrets.WITSELF_EMAIL_CANARY_TOKEN }}
          AGENT_EMAIL_CANARY_TIMEOUT_SECONDS: "600"

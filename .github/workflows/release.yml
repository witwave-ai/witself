name: release

# Tag-triggered release: pushing a vX.Y.Z tag builds the binaries, signs the
# checksums (cosign keyless), generates SBOMs, publishes the GitHub release,
# attaches build-provenance attestations, pushes the witself and witself-server
# multi-arch images to GHCR, publishes the witself Helm chart as an OCI artifact
# to ghcr.io/witwave-ai/charts, and renders and publishes the Homebrew formulae
# to witwave-ai/homebrew-tap before reconciling the existing GHCR latest tags to
# that completed-release pointer. A manual run (workflow_dispatch) is a
# no-publish snapshot that still renders the formulae for validation.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # create the release
  id-token: write # cosign keyless signing + provenance OIDC
  attestations: write # build-provenance attestations
  packages: write # push container images to GHCR

jobs:
  # Re-run CI's Go and Helm gates on the tagged commit before anything publishes.
  # ci.yml only fires on PRs and pushes to main — a tag push skips it —
  # so without this gate a commit that never went green (or went red)
  # can ship as a release. That happened three times on 2026-07-04
  # (v0.0.91–v0.0.93 shipped from gofmt/lint-red commits); this job is
  # the structural fix. Mirror of ci.yml's Go and Helm jobs; keep them in sync.
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: witself
          POSTGRES_PASSWORD: witself
          POSTGRES_DB: witself
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U witself -d witself"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      WITSELF_TEST_DATABASE_URL: postgres://witself:witself@localhost:5432/witself?sslmode=disable
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            infra/pulumi/go.sum

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: install kubeconform
        env:
          KUBECONFORM_VERSION: v0.8.0
          KUBECONFORM_LINUX_AMD64_SHA256: 9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883
        run: |
          curl -fsSLO "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_LINUX_AMD64_SHA256}  kubeconform-linux-amd64.tar.gz" | sha256sum -c -
          tar -xzf kubeconform-linux-amd64.tar.gz
          sudo install kubeconform /usr/local/bin/

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on:"; echo "$unformatted"; exit 1
          fi

      - name: Pin and run ShellCheck and actionlint
        run: bash scripts/test-ci-static-analysis.sh

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./... -race -timeout=20m

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...

      # infra/pulumi is a NESTED module: ./... from the repo root never
      # descends into it, so without this step its tests run nowhere.
      - name: infra module gates
        run: |
          cd infra/pulumi
          go vet ./...
          go build ./...
          go test ./...
          golangci-lint run ./...

      - name: Cloudflare agent-email Worker gates
        run: npm --prefix infra/cloudflare/agent-email test

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: helm lint
        run: |
          helm lint .gitops/charts/apps
          helm lint charts/witself-server
          helm lint charts/witself-server --values charts/witself-server/ci/cloud-values.yaml
          helm lint charts/witself-server --values charts/witself-server/ci/gcp-rollout-values.yaml

      - name: rollout rendering checks
        run: bash scripts/test-helm-rollout.sh

      - name: helm template + kubeconform
        run: |
          for v in "" "ci/self-hosted-values.yaml" "ci/cloud-values.yaml" "ci/gcp-rollout-values.yaml"; do
            args=(); label=default
            if [ -n "$v" ]; then args=(--values "charts/witself-server/$v"); label="$v"; fi
            echo "::group::$label"
            helm template r charts/witself-server "${args[@]}" -n witself | kubeconform -strict -ignore-missing-schemas -summary
            echo "::endgroup::"
          done

  # A tag push does not trigger ci.yml, so repeat the complete native provider
  # and installer matrix here before GoReleaser is allowed to publish. Keep
  # these cells aligned with ci.yml's provider-integration-contract matrix.
  provider-integration-verify:
    name: provider integration release gate / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: macos-intel
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: windows-x64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Record native target
        run: go env GOOS GOARCH

      - name: Build native Witself client
        run: go build ./cmd/witself

      - name: Install GoReleaser for exact client artifact gate
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      - name: Derive CLI-only smoke config from release config
        shell: bash
        run: >-
          scripts/render-goreleaser-witself-smoke-config.sh
          "$RUNNER_TEMP/goreleaser-witself-smoke.yaml"
          .goreleaser.yaml

      - name: Build exact GoReleaser Unix archive and checksums
        if: runner.os != 'Windows'
        shell: bash
        run: |
          goreleaser release \
            --config "$RUNNER_TEMP/goreleaser-witself-smoke.yaml" \
            --snapshot \
            --clean \
            --skip=before,sign,sbom,docker \
            --parallelism 1 \
            --timeout 30m

      - name: Build exact GoReleaser Windows archive
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $config = Join-Path $env:RUNNER_TEMP 'goreleaser-witself-smoke.yaml'
          & goreleaser release --config $config --snapshot --clean '--skip=before,sign,sbom,docker' --parallelism 1 --timeout 30m
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Universal installer artifact smoke
        if: runner.os != 'Windows'
        env:
          WITSELF_INSTALL_SMOKE_GORELEASER_DIST: ${{ github.workspace }}/dist
          WITSELF_INSTALL_SMOKE_OUTPUT: ${{ runner.temp }}/witself-installed
        run: bash scripts/test-install-unix.sh

      - name: Windows binary installer smoke
        if: runner.os == 'Windows'
        shell: powershell
        run: >-
          .\scripts\test-install-windows.ps1
          -GoReleaserDist .\dist
          -InstalledBinaryOutput "$env:RUNNER_TEMP\witself-installed.exe"

      - name: PowerShell static analysis
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\test-powershell-static-analysis.ps1

      - name: Native platform safety primitives
        run: >-
          go test
          ./internal/local
          ./internal/memorycurator
          ./internal/dashboard
          ./internal/transcriptcapture
          -run '^(TestLocalLockFile|TestAutoLockPlatform|TestAutoLockIdentity|TestRegistryClaimLock|TestPIDRunning|TestCapturePlatform|TestReplaceFileAtomic)'
          -count=1

      - name: Managed instruction platform primitives
        run: >-
          go test ./cmd/witself
          -run '^(TestManagedInstructionExchangePrimitive|TestManagedInstructionNoReplacePrimitive|TestWindowsManagedInstruction|TestWindowsIntegrationTransactionSyncPrimitives)'
          -count=1

      - name: Codex Windows hook contract
        run: >-
          go test ./internal/transcriptcapture
          -run '^TestCodexHooksWindows'
          -count=1

      - name: Codex provider installation contract
        run: >-
          go test ./cmd/witself
          -run '^(TestProviderIntegrationContractCodex|TestProviderIntegrationContractCodexRollbackRestoresPriorInstall)$'
          -count=1

      - name: Credential-free provider lifecycle contracts
        run: >-
          go test ./cmd/witself
          -run '^TestProviderIntegrationContract(Claude|Grok|Cursor|OpenClaw|Antigravity|Copilot)$'
          -count=1

      - name: Installed release binary provider acceptance
        if: runner.os != 'Windows'
        env:
          WITSELF_INSTALLED_COMMAND_ACCEPTANCE_BINARY: ${{ runner.temp }}/witself-installed
        run: >-
          go test ./cmd/witself
          -run '^(TestProviderIntegrationContractCodexInstalledCommandMCPStdio|TestProviderIntegrationContract(Claude|Grok|Cursor|OpenClaw|Antigravity|Copilot))$'
          -count=1

      - name: Installed release binary provider acceptance
        if: runner.os == 'Windows'
        env:
          WITSELF_INSTALLED_COMMAND_ACCEPTANCE_BINARY: ${{ runner.temp }}\witself-installed.exe
        run: >-
          go test ./cmd/witself
          -run '^(TestProviderIntegrationContractCodexInstalledCommandMCPStdio|TestProviderIntegrationContract(Claude|Grok|Cursor|OpenClaw|Antigravity|Copilot))$'
          -count=1

  # A tag can point at a commit that never went through normal branch CI. Keep
  # the real Homebrew style/audit gate in the release workflow as well.
  # Runs on ubuntu, not macOS: the formula checks (brew style/audit, tap
  # render, publisher script) are platform-independent Ruby and Homebrew is
  # preinstalled on ubuntu runners — while the snapshot build below compiles
  # the full multi-target matrix including witself-infra's huge Pulumi graph.
  # On the 3-core macOS runner that build ran cold at --parallelism 1 and
  # blew the 2h GoReleaser timeout (v0.0.190: linux_arm64 alone took 1h59m).
  # Ubuntu shares the goreleaser job's warmed release cache key, taking this
  # job to publish-job speeds (~20m cold, ~4m warm).
  homebrew-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Same split as the goreleaser job: skip setup-go's cache and use
          # the dedicated release cache below so both jobs share one fully
          # warmed mod+build cache under the same key family.
          cache: false

      - name: Cache Go release builds
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: release-go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum', 'infra/pulumi/go.sum') }}
          restore-keys: |
            release-go-${{ runner.os }}-${{ runner.arch }}-

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      # Ubuntu runner images no longer bundle Homebrew (macOS images still
      # do), so install it for the formula render/audit step below. Runs
      # before the long snapshot build so an install flake fails fast.
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # master 2026-07-17

      # This no-publish pass deliberately uses the real GoReleaser archive
      # pipeline. It catches archive-name or target drift before the release job
      # publishes any GitHub or GHCR artifact.
      #
      # --parallelism 1: a SINGLE witself-infra cross-compile of the Pulumi
      # provider graph peaks near 10GB; two concurrently OOM'd the 16GB
      # runner (exit 143, v0.0.191 attempts one and two — attempt one at
      # default parallelism, attempt two at 2). Sequential builds fit in
      # memory and land well inside the 2h ceiling on ubuntu (~5-8m per
      # infra target cold, small binaries in seconds). Cold pain is paid
      # exactly once: actions/cache saves only on job SUCCESS, and the
      # publish job (needs: homebrew-verify) shares this cache key family,
      # so the first green verify warms every later verify AND publish.
      - name: Build Homebrew archive contract
        run: >-
          goreleaser release
          --snapshot
          --clean
          --skip=docker,sbom,sign
          --parallelism 1
          --timeout 2h

      - name: Render and audit actual Homebrew archives
        run: |
          version="$(jq -r '.version // empty' dist/metadata.json)"
          [[ -n "$version" ]] || { echo "missing GoReleaser version" >&2; exit 1; }
          bash scripts/test-homebrew-formulas.sh dist "$version"

      - name: Test Homebrew tap publisher
        run: bash scripts/test-publish-homebrew-formulas.sh

      - name: Test GHCR latest reconciliation
        run: bash scripts/test-promote-latest-images.sh

  goreleaser:
    needs: [verify, provider-integration-verify, homebrew-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # The release job has its own cache below. Sharing setup-go's root-module
          # cache with CI made releases restore a partial cache and then skip saving
          # the fully warmed infra/pulumi cache on primary-key hits.
          cache: false

      # Cache both Go module downloads and compiled package objects for release
      # builds. The nested infra/pulumi module pulls in the large Pulumi/provider
      # graph, so a warm cache takes full releases from roughly 20m to about 4m.
      - name: Cache Go release builds
        id: release-go-cache
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: release-go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum', 'infra/pulumi/go.sum') }}
          restore-keys: |
            release-go-${{ runner.os }}-${{ runner.arch }}-

      # Installer v3 is limited to Cosign v2. Use the v4 installer for the
      # bundle-first Cosign v3 release format configured in .goreleaser.yaml.
      - uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.1.2
      - uses: anchore/sbom-action/download-syft@v0
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.4
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free runner disk before GoReleaser
        run: |
          available_gb=$(df -BG / | awk 'NR == 2 { gsub("G", "", $4); print $4 }')

          df -h

          # The old unconditional cleanup could spend more than a minute deleting
          # bundled runner assets even with 70G free. Keep it as a safety valve for
          # unusually full runners, but skip it when there is already enough space.
          if (( available_gb >= 50 )); then
            echo "Skipping deep cleanup; ${available_gb}G available on /."
            exit 0
          fi

          echo "Only ${available_gb}G available on /; freeing bundled runner assets."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      - name: Validate GoReleaser configuration
        run: goreleaser check

      - name: Test checksum signer integration
        run: bash scripts/test-cosign-checksums.sh

      - name: Run GoReleaser
        env:
          # --parallelism 1: witself-infra now includes the AWS, GCP, Azure,
          # and Kubernetes provider graph. Running two infra builds together
          # exhausted the GitHub runner during v0.0.116, so serialize builds and
          # lean on the Go cache for speed.
          RELEASE_ARGS: >-
            ${{ github.event_name == 'push' && 'release --clean --parallelism 1 --timeout 2h'
                || 'release --snapshot --clean --skip=sign --parallelism 1 --timeout 2h' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail

          release_start="$RUNNER_TEMP/release-goreleaser-start"
          release_end="$RUNNER_TEMP/release-goreleaser-end"
          release_log="$RUNNER_TEMP/goreleaser.log"

          # Keep timing/log files outside the checkout. Real tag releases fail
          # GoReleaser's dirty-state validation if wrapper files touch the worktree.
          date +%s > "$release_start"
          read -r -a goreleaser_args <<< "$RELEASE_ARGS"

          set +e
          goreleaser "${goreleaser_args[@]}" 2>&1 | tee "$release_log"
          status=${PIPESTATUS[0]}
          set -e

          date +%s > "$release_end"
          exit "$status"

      - name: Render Homebrew formulae
        id: homebrew
        run: |
          version="$(jq -r '.version // empty' dist/metadata.json)"
          if [[ -z "$version" ]]; then
            echo "GoReleaser metadata did not contain a release version" >&2
            exit 1
          fi

          go run ./tools/homebrew-formula \
            --version "$version" \
            --dist dist \
            --output dist/homebrew

          for formula in dist/homebrew/Formula/*.rb; do
            ruby -c "$formula"
          done

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Attest container SBOMs
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          for image_name in witself witself-server; do
            image="ghcr.io/witwave-ai/images/${image_name}"
            sbom="$RUNNER_TEMP/${image_name}-${version}.spdx.json"

            syft "${image}:${version}" --output "spdx-json=${sbom}" --enrich all
            cosign attest --yes --type https://spdx.dev/Document --predicate "$sbom" "${image}:${version}"
          done

      - name: Summarize release timings
        if: always()
        env:
          RELEASE_ARGS: >-
            ${{ github.event_name == 'push' && 'release --clean --parallelism 1 --timeout 2h'
                || 'release --snapshot --clean --skip=sign --parallelism 1 --timeout 2h' }}
          RELEASE_CACHE_HIT: ${{ steps.release-go-cache.outputs.cache-hit }}
          RELEASE_CACHE_KEY: release-go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum', 'infra/pulumi/go.sum') }}
        run: |
          {
            echo "## Release workflow summary"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| GoReleaser args | \`$RELEASE_ARGS\` |"
            echo "| Release Go cache hit | \`${RELEASE_CACHE_HIT:-false}\` |"
            echo "| Release Go cache key | \`$RELEASE_CACHE_KEY\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          release_start="$RUNNER_TEMP/release-goreleaser-start"
          release_end="$RUNNER_TEMP/release-goreleaser-end"
          release_log="$RUNNER_TEMP/goreleaser.log"

          if [[ -f "$release_start" && -f "$release_end" ]]; then
            start=$(<"$release_start")
            end=$(<"$release_end")
            elapsed=$((end - start))
            {
              echo "| GoReleaser elapsed | \`${elapsed}s\` |"
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ -f "$release_log" ]]; then
            perl -pe 's/\e\[[0-9;]*[[:alpha:]]//g' "$release_log" > "$RUNNER_TEMP/goreleaser.clean.log"
            awk '
              /took:/ {
                if (match($0, /took: [^[:space:]]+/)) {
                  took = substr($0, RSTART + 6, RLENGTH - 6)
                  if (phase != "") {
                    print phase "|" took
                  }
                }
                next
              }
              /cataloging/ {
                phase = "cataloging"
                next
              }
              /^[[:space:]]*[^[:alnum:][:space:]][[:space:]]+/ {
                line = $0
                sub(/^[[:space:]]*[^[:alnum:][:space:]][[:space:]]+/, "", line)
                if (line != "" && line !~ /^took:/ && line !~ /^cmd=/) {
                  phase = line
                }
              }
            ' "$RUNNER_TEMP/goreleaser.clean.log" > "$RUNNER_TEMP/goreleaser.phases"

            if [[ -s "$RUNNER_TEMP/goreleaser.phases" ]]; then
              {
                echo "### GoReleaser Phases"
                echo
                echo "| Phase | Duration |"
                echo "| --- | ---: |"
                while IFS='|' read -r phase took; do
                  echo "| $phase | \`$took\` |"
                done < "$RUNNER_TEMP/goreleaser.phases"
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          if [[ -f dist/artifacts.json ]]; then
            total=$(jq 'length' dist/artifacts.json)
            archives=$(jq '[.[] | select(.type == "Archive")] | length' dist/artifacts.json)
            sboms=$(jq '[.[] | select(.type == "SBOM")] | length' dist/artifacts.json)
            images=$(jq '[.[] | select(.type == "Docker Image")] | length' dist/artifacts.json)
            {
              echo "### Release Artifacts"
              echo
              echo "| Type | Count |"
              echo "| --- | ---: |"
              echo "| Total | $total |"
              echo "| Archives | $archives |"
              echo "| SBOMs | $sboms |"
              echo "| Docker images | $images |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      # Package the chart with version + appVersion pinned to the release tag, so
      # the chart's default image tag matches the image built in this same run.
      - name: Publish Helm chart (OCI)
        if: github.event_name == 'push'
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package charts/witself-server --version "$VER" --app-version "$VER" --destination dist-charts
          helm push "dist-charts/witself-server-${VER}.tgz" oci://ghcr.io/witwave-ai/charts

      - name: Attest chart provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist-charts/*.tgz"

      # The tap is the human-facing mutable install channel. Promote it last,
      # only after every release artifact and attestation has succeeded.
      - name: Publish Homebrew formulae
        if: github.event_name == 'push'
        env:
          # This deliberately differs from the legacy secret name. Revoking the
          # old workflow's tap credential prevents a historical run re-play
          # from publishing an older formula after this migration.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_PUBLISH_TOKEN }}
        run: >-
          bash scripts/publish-homebrew-formulas.sh
          dist/homebrew
          "${{ steps.homebrew.outputs.version }}"

  # Mutable image tags deliberately stay outside GoReleaser. This job is
  # serialized across tag workflows and reads the current tap only after the
  # immutable release and every attestation completed. Pending jobs may be
  # coalesced safely because every surviving run reconciles the same durable
  # completed-release pointer instead of its triggering tag.
  promote-latest:
    if: github.event_name == 'push'
    needs: goreleaser
    runs-on: ubuntu-latest
    concurrency:
      group: witself-ghcr-latest
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reconcile latest image tags
        run: bash scripts/promote-latest-images.sh

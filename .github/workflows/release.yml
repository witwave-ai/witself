name: release

# Tag-triggered release: pushing a vX.Y.Z tag builds the binaries, signs the
# checksums (cosign keyless), generates SBOMs, publishes the GitHub release,
# attaches build-provenance attestations, pushes the ws and witself-server
# multi-arch images to GHCR, publishes the witself Helm chart as an OCI artifact
# to ghcr.io/witwave-ai/charts, and pushes the Homebrew formula to witwave-ai/
# homebrew-tap. A manual run (workflow_dispatch) is a no-publish snapshot.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # create the release
  id-token: write # cosign keyless signing + provenance OIDC
  attestations: write # build-provenance attestations
  packages: write # push container images to GHCR

jobs:
  # Re-run CI's go gates on the tagged commit before anything publishes.
  # ci.yml only fires on PRs and pushes to main — a tag push skips it —
  # so without this gate a commit that never went green (or went red)
  # can ship as a release. That happened three times on 2026-07-04
  # (v0.0.91–v0.0.93 shipped from gofmt/lint-red commits); this job is
  # the structural fix. Mirror of ci.yml's go job; keep them in sync.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            infra/pulumi/go.sum

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./... -race

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...

      # infra/pulumi is a NESTED module: ./... from the repo root never
      # descends into it, so without this step its tests run nowhere.
      - name: infra module gates
        run: |
          cd infra/pulumi
          go vet ./...
          go build ./...
          go test ./...
          golangci-lint run ./...

  goreleaser:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # The release job has its own cache below. Sharing setup-go's root-module
          # cache with CI made releases restore a partial cache and then skip saving
          # the fully warmed infra/pulumi cache on primary-key hits.
          cache: false

      # Cache both Go module downloads and compiled package objects for release
      # builds. The nested infra/pulumi module pulls in the large Pulumi/provider
      # graph, so a warm cache takes full releases from roughly 20m to about 4m.
      - name: Cache Go release builds
        id: release-go-cache
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: release-go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum', 'infra/pulumi/go.sum') }}
          restore-keys: |
            release-go-${{ runner.os }}-${{ runner.arch }}-

      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.4
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free runner disk before GoReleaser
        run: |
          available_gb=$(df -BG / | awk 'NR == 2 { gsub("G", "", $4); print $4 }')

          df -h

          # The old unconditional cleanup could spend more than a minute deleting
          # bundled runner assets even with 70G free. Keep it as a safety valve for
          # unusually full runners, but skip it when there is already enough space.
          if (( available_gb >= 50 )); then
            echo "Skipping deep cleanup; ${available_gb}G available on /."
            exit 0
          fi

          echo "Only ${available_gb}G available on /; freeing bundled runner assets."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Run GoReleaser
        env:
          # --parallelism 1: witself-infra now includes the AWS, GCP, Azure,
          # and Kubernetes provider graph. Running two infra builds together
          # exhausted the GitHub runner during v0.0.116, so serialize builds and
          # lean on the Go cache for speed.
          RELEASE_ARGS: >-
            ${{ github.event_name == 'push' && 'release --clean --parallelism 1'
                || 'release --snapshot --clean --skip=sign --parallelism 1' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for the cross-repo Homebrew formula push (org secret).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -o pipefail

          release_start="$RUNNER_TEMP/release-goreleaser-start"
          release_end="$RUNNER_TEMP/release-goreleaser-end"
          release_log="$RUNNER_TEMP/goreleaser.log"

          # Keep timing/log files outside the checkout. Real tag releases fail
          # GoReleaser's dirty-state validation if wrapper files touch the worktree.
          date +%s > "$release_start"
          read -r -a goreleaser_args <<< "$RELEASE_ARGS"

          set +e
          goreleaser "${goreleaser_args[@]}" 2>&1 | tee "$release_log"
          status=${PIPESTATUS[0]}
          set -e

          date +%s > "$release_end"
          exit "$status"

      - name: Attest container SBOMs
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          for image_name in witself witself-server; do
            image="ghcr.io/witwave-ai/images/${image_name}"
            sbom="$RUNNER_TEMP/${image_name}-${version}.spdx.json"

            syft "${image}:${version}" --output "spdx-json=${sbom}" --enrich all
            cosign attest --yes --type https://spdx.dev/Document --predicate "$sbom" "${image}:${version}"
            cosign attest --yes --type https://spdx.dev/Document --predicate "$sbom" "${image}:latest"
          done

      - name: Summarize release timings
        if: always()
        env:
          RELEASE_ARGS: >-
            ${{ github.event_name == 'push' && 'release --clean --parallelism 1'
                || 'release --snapshot --clean --skip=sign --parallelism 1' }}
          RELEASE_CACHE_HIT: ${{ steps.release-go-cache.outputs.cache-hit }}
          RELEASE_CACHE_KEY: release-go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum', 'infra/pulumi/go.sum') }}
        run: |
          {
            echo "## Release workflow summary"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| GoReleaser args | \`$RELEASE_ARGS\` |"
            echo "| Release Go cache hit | \`${RELEASE_CACHE_HIT:-false}\` |"
            echo "| Release Go cache key | \`$RELEASE_CACHE_KEY\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          release_start="$RUNNER_TEMP/release-goreleaser-start"
          release_end="$RUNNER_TEMP/release-goreleaser-end"
          release_log="$RUNNER_TEMP/goreleaser.log"

          if [[ -f "$release_start" && -f "$release_end" ]]; then
            start=$(<"$release_start")
            end=$(<"$release_end")
            elapsed=$((end - start))
            {
              echo "| GoReleaser elapsed | \`${elapsed}s\` |"
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ -f "$release_log" ]]; then
            perl -pe 's/\e\[[0-9;]*[[:alpha:]]//g' "$release_log" > "$RUNNER_TEMP/goreleaser.clean.log"
            awk '
              /took:/ {
                if (match($0, /took: [^[:space:]]+/)) {
                  took = substr($0, RSTART + 6, RLENGTH - 6)
                  if (phase != "") {
                    print phase "|" took
                  }
                }
                next
              }
              /cataloging/ {
                phase = "cataloging"
                next
              }
              /^[[:space:]]*[^[:alnum:][:space:]][[:space:]]+/ {
                line = $0
                sub(/^[[:space:]]*[^[:alnum:][:space:]][[:space:]]+/, "", line)
                if (line != "" && line !~ /^took:/ && line !~ /^cmd=/) {
                  phase = line
                }
              }
            ' "$RUNNER_TEMP/goreleaser.clean.log" > "$RUNNER_TEMP/goreleaser.phases"

            if [[ -s "$RUNNER_TEMP/goreleaser.phases" ]]; then
              {
                echo "### GoReleaser Phases"
                echo
                echo "| Phase | Duration |"
                echo "| --- | ---: |"
                while IFS='|' read -r phase took; do
                  echo "| $phase | \`$took\` |"
                done < "$RUNNER_TEMP/goreleaser.phases"
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          if [[ -f dist/artifacts.json ]]; then
            total=$(jq 'length' dist/artifacts.json)
            archives=$(jq '[.[] | select(.type == "Archive")] | length' dist/artifacts.json)
            sboms=$(jq '[.[] | select(.type == "SBOM")] | length' dist/artifacts.json)
            images=$(jq '[.[] | select(.type == "Docker Image")] | length' dist/artifacts.json)
            {
              echo "### Release Artifacts"
              echo
              echo "| Type | Count |"
              echo "| --- | ---: |"
              echo "| Total | $total |"
              echo "| Archives | $archives |"
              echo "| SBOMs | $sboms |"
              echo "| Docker images | $images |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*.tar.gz"

      # Package the chart with version + appVersion pinned to the release tag, so
      # the chart's default image tag matches the image built in this same run.
      - name: Publish Helm chart (OCI)
        if: github.event_name == 'push'
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package charts/witself-server --version "$VER" --app-version "$VER" --destination dist-charts
          helm push "dist-charts/witself-server-${VER}.tgz" oci://ghcr.io/witwave-ai/charts

      - name: Attest chart provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist-charts/*.tgz"

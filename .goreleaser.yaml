version: 2

project_name: ws

before:
  hooks:
    - go mod tidy

builds:
  - id: ws
    main: ./cmd/ws
    binary: ws
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/witwave-ai/witself/internal/version.Version={{ .Version }}
      - -X github.com/witwave-ai/witself/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/witwave-ai/witself/internal/version.Date={{ .Date }}

  - id: witself-server
    main: ./cmd/witself-server
    binary: witself-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/witwave-ai/witself/internal/version.Version={{ .Version }}
      - -X github.com/witwave-ai/witself/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/witwave-ai/witself/internal/version.Date={{ .Date }}

archives:
  - id: ws
    ids:
      - ws
    formats:
      - tar.gz
    name_template: "ws_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: witself-server
    ids:
      - witself-server
    formats:
      - tar.gz
    name_template: "witself-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# SBOM per archive (syft). Attached to the release.
sboms:
  - id: archive
    artifacts: archive

# Keyless cosign signature over the checksums file (Sigstore; uses CI OIDC).
# Verify: cosign verify-blob --certificate checksums.txt.pem \
#   --signature checksums.txt.sig --certificate-identity-regexp '.*' \
#   --certificate-oidc-issuer https://token.actions.githubusercontent.com checksums.txt
signs:
  - id: checksums
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# witself-server container image: one image per arch, combined into a multi-arch
# manifest. The Dockerfile only COPYs the prebuilt binary, so cross-arch builds
# need no emulation.
dockers:
  - id: witself-server-amd64
    ids:
      - witself-server
    goos: linux
    goarch: amd64
    dockerfile: images/witself-server/Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=witself-server"
      - "--label=org.opencontainers.image.source=https://github.com/witwave-ai/witself"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=FSL-1.1-ALv2"
  - id: witself-server-arm64
    ids:
      - witself-server
    goos: linux
    goarch: arm64
    dockerfile: images/witself-server/Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=witself-server"
      - "--label=org.opencontainers.image.source=https://github.com/witwave-ai/witself"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=FSL-1.1-ALv2"

docker_manifests:
  - name_template: "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}"
    image_templates:
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-amd64"
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-arm64"
  - name_template: "ghcr.io/witwave-ai/images/witself-server:latest"
    image_templates:
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-amd64"
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-arm64"

brews:
  - name: ws
    ids:
      - ws
    directory: Formula
    repository:
      owner: witwave-ai
      name: homebrew-tap
      # The built-in GITHUB_TOKEN cannot push to another repo, so the formula
      # push uses HOMEBREW_TAP_TOKEN (a token with write access to homebrew-tap).
      # CI provides it from the org secret. For a local release, export it first,
      # e.g. HOMEBREW_TAP_TOKEN="$(gh auth token)".
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/witwave-ai/witself"
    description: "Witself CLI (ws)"
    license: "FSL-1.1-ALv2"
    install: |
      bin.install "ws"
    test: |
      system "#{bin}/ws", "version"

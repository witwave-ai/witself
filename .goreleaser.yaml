version: 2

project_name: witself

before:
  hooks:
    - go mod tidy

builds:
  - id: witself
    main: ./cmd/witself
    binary: witself
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/witwave-ai/witself/internal/version.Version={{ .Version }}
      - -X github.com/witwave-ai/witself/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/witwave-ai/witself/internal/version.Date={{ .Date }}

  - id: witself-server
    main: ./cmd/witself-server
    binary: witself-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/witwave-ai/witself/internal/version.Version={{ .Version }}
      - -X github.com/witwave-ai/witself/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/witwave-ai/witself/internal/version.Date={{ .Date }}

  - id: witself-admin
    main: ./cmd/witself-admin
    binary: witself-admin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/witwave-ai/witself/internal/version.Version={{ .Version }}
      - -X github.com/witwave-ai/witself/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/witwave-ai/witself/internal/version.Date={{ .Date }}

  # witself-infra lives in its own nested Go module (infra/pulumi) so its large
  # Pulumi/provider dependency tree never touches the lean ws / witself-server
  # binaries. `dir` builds it from that module; `main` is relative to `dir`.
  - id: witself-infra
    dir: infra/pulumi
    main: ./cmd/witself-infra
    binary: witself-infra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # The nested module can't import the root module's internal/version,
    # so the stamp lands on main-package vars instead.
    ldflags:
      - -s -w -X main.buildVersion={{.Version}} -X main.buildCommit={{.ShortCommit}} -X main.buildDate={{.CommitDate}}

archives:
  - id: witself
    ids:
      - witself
    formats:
      - tar.gz
    name_template: "witself_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: witself-server
    ids:
      - witself-server
    formats:
      - tar.gz
    name_template: "witself-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: witself-admin
    ids:
      - witself-admin
    formats:
      - tar.gz
    name_template: "witself-admin_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: witself-infra
    ids:
      - witself-infra
    formats:
      - tar.gz
    name_template: "witself-infra_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# A tag workflow can fail after GitHub has accepted some or all release assets
# (for example, during a transient GitHub API outage). Make an exact-tag retry
# repair that partial release instead of failing on duplicate asset names.
release:
  replace_existing_artifacts: true
  # The signer wrapper creates this detached compatibility signature before the
  # release pipe begins. The canonical bundle and PEM certificate are tracked
  # directly by the sign pipe; this third output is picked up here.
  extra_files:
    - glob: dist/checksums.txt.sig

# SBOM per archive (syft). Attached to the release.
sboms:
  - id: archive
    artifacts: archive

# Keyless Cosign v3 bundle over the checksums file (Sigstore; uses CI OIDC).
# The signer wrapper derives legacy .sig/.pem companions from this bundle for
# already-released upgraders and verifies both formats before publishing starts.
# Verify: cosign verify-blob --bundle checksums.txt.sigstore.json \
#   --certificate-identity \
#   'https://github.com/witwave-ai/witself/.github/workflows/release.yml@refs/tags/vX.Y.Z' \
#   --certificate-oidc-issuer https://token.actions.githubusercontent.com checksums.txt
signs:
  - id: checksums
    cmd: bash
    signature: "${artifact}.sigstore.json"
    certificate: "${artifact}.pem"
    args:
      - ./scripts/cosign-checksums.sh
      - "${artifact}"
      - "${signature}"
      - "${certificate}"
    artifacts: checksum
    output: true

# Container images: one image per arch, combined into multi-arch manifests. The
# Dockerfiles only COPY the prebuilt binaries, so cross-arch builds need no Go
# compilation or emulation.
dockers:
  - id: witself-amd64
    ids:
      - witself
    goos: linux
    goarch: amd64
    dockerfile: images/witself/Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/witwave-ai/images/witself:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=witself"
      - "--label=org.opencontainers.image.source=https://github.com/witwave-ai/witself"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=FSL-1.1-ALv2"
  - id: witself-arm64
    ids:
      - witself
    goos: linux
    goarch: arm64
    dockerfile: images/witself/Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/witwave-ai/images/witself:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=witself"
      - "--label=org.opencontainers.image.source=https://github.com/witwave-ai/witself"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=FSL-1.1-ALv2"
  - id: witself-server-amd64
    ids:
      - witself-server
    goos: linux
    goarch: amd64
    dockerfile: images/witself-server/Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=witself-server"
      - "--label=org.opencontainers.image.source=https://github.com/witwave-ai/witself"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=FSL-1.1-ALv2"
  - id: witself-server-arm64
    ids:
      - witself-server
    goos: linux
    goarch: arm64
    dockerfile: images/witself-server/Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=witself-server"
      - "--label=org.opencontainers.image.source=https://github.com/witwave-ai/witself"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=FSL-1.1-ALv2"

docker_manifests:
  - name_template: "ghcr.io/witwave-ai/images/witself:{{ .Version }}"
    image_templates:
      - "ghcr.io/witwave-ai/images/witself:{{ .Version }}-amd64"
      - "ghcr.io/witwave-ai/images/witself:{{ .Version }}-arm64"
  - name_template: "ghcr.io/witwave-ai/images/witself:latest"
    image_templates:
      - "ghcr.io/witwave-ai/images/witself:{{ .Version }}-amd64"
      - "ghcr.io/witwave-ai/images/witself:{{ .Version }}-arm64"
  - name_template: "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}"
    image_templates:
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-amd64"
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-arm64"
  - name_template: "ghcr.io/witwave-ai/images/witself-server:latest"
    image_templates:
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-amd64"
      - "ghcr.io/witwave-ai/images/witself-server:{{ .Version }}-arm64"

# Keyless cosign signatures over the published multi-arch container manifests.
# GoReleaser supplies the manifest digest from the registry after publish.
docker_signs:
  - id: container-manifests
    cmd: cosign
    artifacts: manifests
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"
    output: true

brews:
  - name: witself
    ids:
      - witself
    directory: Formula
    repository:
      owner: witwave-ai
      name: homebrew-tap
      # The built-in GITHUB_TOKEN cannot push to another repo, so the formula
      # push uses HOMEBREW_TAP_TOKEN (a token with write access to homebrew-tap).
      # CI provides it from the org secret. For a local release, export it first,
      # e.g. HOMEBREW_TAP_TOKEN="$(gh auth token)".
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/witwave-ai/witself"
    description: "Witself CLI"
    license: "FSL-1.1-ALv2"
    install: |
      bin.install "witself"
      # Muscle-memory alias: `ws` keeps working forever.
      bin.install_symlink "witself" => "ws"
    test: |
      system "#{bin}/witself", "version"

  - name: witself-infra
    ids:
      - witself-infra
    directory: Formula
    repository:
      owner: witwave-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/witwave-ai/witself"
    description: "Witself cell infrastructure provisioner (Pulumi-Go via the Automation API)"
    license: "FSL-1.1-ALv2"
    # The Automation API drives the pulumi engine binary, so the formula pulls it
    # in. (A future self-bootstrap can install a pinned engine and drop this.)
    dependencies:
      - name: pulumi
    install: |
      bin.install "witself-infra"
    test: |
      system "#{bin}/witself-infra", "help"

  - name: witself-admin
    ids:
      - witself-admin
    directory: Formula
    repository:
      owner: witwave-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/witwave-ai/witself"
    description: "Witself fleet-admin CLI (talks only to the Witself control plane)"
    license: "FSL-1.1-ALv2"
    install: |
      bin.install "witself-admin"
    test: |
      system "#{bin}/witself-admin", "version"

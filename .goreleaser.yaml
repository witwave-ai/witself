# yaml-language-server: $schema=https://raw.githubusercontent.com/goreleaser/goreleaser/v2.17.0/www/static/schema.json
version: 2

project_name: witself

before:
  hooks:
    - go mod tidy

builds:
  - id: witself
    main: ./cmd/witself
    binary: witself
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/witwave-ai/witself/internal/version.Version={{ .Version }}
      - -X github.com/witwave-ai/witself/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/witwave-ai/witself/internal/version.Date={{ .Date }}

  - id: witself-server
    main: ./cmd/witself-server
    binary: witself-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/witwave-ai/witself/internal/version.Version={{ .Version }}
      - -X github.com/witwave-ai/witself/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/witwave-ai/witself/internal/version.Date={{ .Date }}

  - id: witself-admin
    main: ./cmd/witself-admin
    binary: witself-admin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/witwave-ai/witself/internal/version.Version={{ .Version }}
      - -X github.com/witwave-ai/witself/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/witwave-ai/witself/internal/version.Date={{ .Date }}

  # witself-infra lives in its own nested Go module (infra/pulumi) so its large
  # Pulumi/provider dependency tree never touches the lean ws / witself-server
  # binaries. `dir` builds it from that module; `main` is relative to `dir`.
  - id: witself-infra
    dir: infra/pulumi
    main: ./cmd/witself-infra
    binary: witself-infra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # The nested module can't import the root module's internal/version,
    # so the stamp lands on main-package vars instead.
    ldflags:
      - -s -w -X main.buildVersion={{.Version}} -X main.buildCommit={{.ShortCommit}} -X main.buildDate={{.CommitDate}}

archives:
  - id: witself
    ids:
      - witself
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "witself_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: witself-server
    ids:
      - witself-server
    formats:
      - tar.gz
    name_template: "witself-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: witself-admin
    ids:
      - witself-admin
    formats:
      - tar.gz
    name_template: "witself-admin_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: witself-infra
    ids:
      - witself-infra
    formats:
      - tar.gz
    name_template: "witself-infra_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# A tag workflow can fail after GitHub has accepted some or all release assets
# (for example, during a transient GitHub API outage). Make an exact-tag retry
# repair that partial release instead of failing on duplicate asset names.
release:
  replace_existing_artifacts: true
  # The signer wrapper creates this detached compatibility signature before the
  # release pipe begins. The canonical bundle and PEM certificate are tracked
  # directly by the sign pipe; this third output is picked up here.
  extra_files:
    - glob: dist/checksums.txt.sig

# SBOM per archive (syft). Attached to the release.
sboms:
  - id: archive
    artifacts: archive

# Keyless Cosign v3 bundle over the checksums file (Sigstore; uses CI OIDC).
# The signer wrapper derives legacy .sig/.pem companions from this bundle for
# already-released upgraders and verifies both formats before publishing starts.
# Verify: cosign verify-blob --bundle checksums.txt.sigstore.json \
#   --certificate-identity \
#   'https://github.com/witwave-ai/witself/.github/workflows/release.yml@refs/tags/vX.Y.Z' \
#   --certificate-oidc-issuer https://token.actions.githubusercontent.com checksums.txt
signs:
  - id: checksums
    cmd: bash
    signature: "${artifact}.sigstore.json"
    certificate: "${artifact}.pem"
    args:
      - ./scripts/cosign-checksums.sh
      - "${artifact}"
      - "${signature}"
      - "${certificate}"
    artifacts: checksum
    output: true

# Build each container and its multi-architecture manifest in one BuildKit
# operation. The Dockerfiles only COPY GoReleaser's platform-partitioned
# binaries, so no emulation or in-container compilation is required.
dockers_v2:
  - id: witself
    ids:
      - witself
    dockerfile: images/witself/Dockerfile
    images:
      - "ghcr.io/witwave-ai/images/witself"
    tags:
      - "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
    # The release workflow creates and attests a Syft SBOM for each published
    # image, so do not add a second BuildKit-generated SBOM attestation here.
    sbom: false
    labels:
      "org.opencontainers.image.title": "witself"
      "org.opencontainers.image.source": "https://github.com/witwave-ai/witself"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.licenses": "FSL-1.1-ALv2"

  - id: witself-server
    ids:
      - witself-server
    dockerfile: images/witself-server/Dockerfile
    images:
      - "ghcr.io/witwave-ai/images/witself-server"
    tags:
      - "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: false
    labels:
      "org.opencontainers.image.title": "witself-server"
      "org.opencontainers.image.source": "https://github.com/witwave-ai/witself"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.licenses": "FSL-1.1-ALv2"

# Keyless cosign signatures over every published Docker v2 image tag.
# GoReleaser supplies each multi-architecture digest after BuildKit publishes it.
docker_signs:
  - id: container-manifests
    cmd: cosign
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"
    output: true

# Homebrew formulae intentionally use the owned renderer under
# tools/homebrew-formula. GoReleaser's legacy `brews` pipe is deprecated, while
# its replacement casks require macOS signing/notarization for a clean install.

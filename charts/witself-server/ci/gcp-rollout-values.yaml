# GKE rollout profile used by template validation. This mirrors the production
# availability controls passed through the GitOps apps chart.
backend:
  kind: managed

database:
  existingSecret:
    name: witself-db
    urlKey: dsn

replicaCount: 2

lifecycle:
  preStopSleepSeconds: 120

terminationGracePeriodSeconds: 210

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  - maxSkew: 1
    minDomains: 2
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: witself-server
        app.kubernetes.io/instance: witself-server

worker:
  enabled: true
  replicaCount: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  terminationGracePeriodSeconds: 30
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      minDomains: 2
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: witself-worker
          app.kubernetes.io/instance: witself-server
          app.kubernetes.io/component: worker

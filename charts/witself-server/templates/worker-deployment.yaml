{{- if .Values.worker.enabled }}
{{- if not .Values.database.existingSecret.name }}
{{- fail "worker.enabled requires database.existingSecret.name" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "witself-server.workerFullname" . }}
  labels:
    {{- include "witself-server.workerLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  minReadySeconds: {{ .Values.worker.minReadySeconds }}
  strategy:
    {{- toYaml .Values.worker.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "witself-server.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/worker-configmap.yaml") . | sha256sum }}
        {{- with .Values.worker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "witself-server.workerSelectorLabels" . | nindent 8 }}
        {{- with .Values.worker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "witself-server.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      containers:
        - name: witself-worker
          image: {{ include "witself-server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/witself-worker
          args:
            - serve
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "witself-server.workerFullname" . }}
          env:
            - name: WITSELF_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name | quote }}
                  key: {{ .Values.database.existingSecret.urlKey | quote }}
          ports:
            - name: health
              containerPort: {{ .Values.worker.health.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.worker.metrics.port }}
              protocol: TCP
          {{- if .Values.worker.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.worker.probes.liveness.path }}
              port: health
            initialDelaySeconds: {{ .Values.worker.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.worker.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.worker.probes.readiness.path }}
              port: health
            initialDelaySeconds: {{ .Values.worker.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.worker.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.worker.probes.startup.path }}
              port: health
            periodSeconds: {{ .Values.worker.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.probes.startup.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "witself-server.fullname" . }}
  labels:
    {{- include "witself-server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "witself-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "witself-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "witself-server.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: witself-server
          image: {{ include "witself-server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "witself-server.fullname" . }}
          {{- if or .Values.database.existingSecret.name .Values.bootstrap.existingSecret.name .Values.provision.existingSecret.name }}
          env:
          {{- if .Values.bootstrap.existingSecret.name }}
            - name: WITSELF_BOOTSTRAP_TOKEN_FILE
              value: {{ .Values.bootstrap.tokenFile | quote }}
            - name: WITSELF_BOOTSTRAP_TOKEN_TTL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrap.existingSecret.name | quote }}
                  key: {{ .Values.bootstrap.existingSecret.ttlKey | quote }}
                  optional: true
          {{- end }}
          {{- if .Values.provision.existingSecret.name }}
            - name: WITSELF_PROVISION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.provision.existingSecret.name | quote }}
                  key: {{ .Values.provision.existingSecret.tokenKey | quote }}
          {{- end }}
          {{- if .Values.database.existingSecret.name }}
            - name: WITSELF_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name | quote }}
                  key: {{ .Values.database.existingSecret.urlKey | quote }}
          {{- end }}
          {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.server.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: health
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: health
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: health
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.bootstrap.existingSecret.name }}
            - name: bootstrap-token
              mountPath: {{ dir .Values.bootstrap.tokenFile | quote }}
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- if .Values.bootstrap.existingSecret.name }}
        - name: bootstrap-token
          secret:
            secretName: {{ .Values.bootstrap.existingSecret.name | quote }}
            items:
              - key: {{ .Values.bootstrap.existingSecret.tokenKey | quote }}
                path: {{ base .Values.bootstrap.tokenFile | quote }}
        {{- end }}
        # readOnlyRootFilesystem is on; give the process a writable /tmp.
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

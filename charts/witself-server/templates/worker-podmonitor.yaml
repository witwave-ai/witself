{{- if and .Values.worker.enabled .Values.worker.metrics.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "witself-server.workerFullname" . }}
  labels:
    {{- include "witself-server.workerLabels" . | nindent 4 }}
    {{- with .Values.worker.metrics.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "witself-server.workerSelectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  podMetricsEndpoints:
    - port: metrics
      path: {{ .Values.worker.metrics.path }}
      interval: {{ .Values.worker.metrics.podMonitor.interval }}
      scrapeTimeout: {{ .Values.worker.metrics.podMonitor.scrapeTimeout }}
{{- end }}

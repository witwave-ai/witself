{{- if and .Values.worker.enabled .Values.worker.metrics.serviceMonitor.enabled }}
{{- if not .Values.worker.metrics.service.enabled }}
{{- fail "worker.metrics.serviceMonitor.enabled requires worker.metrics.service.enabled" }}
{{- end }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "witself-server.workerFullname" . }}
  labels:
    {{- include "witself-server.workerLabels" . | nindent 4 }}
    {{- with .Values.worker.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "witself-server.workerSelectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      path: {{ .Values.worker.metrics.path }}
      interval: {{ .Values.worker.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.worker.metrics.serviceMonitor.scrapeTimeout }}
      {{- with .Values.worker.metrics.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.metrics.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

apiVersion: v1
kind: Pod
metadata:
  name: {{ include "witself-server.fullname" . }}-test-connection
  labels:
    # Deliberately NOT the selector labels, so this pod is never selected by the
    # Service/Deployment/monitors.
    helm.sh/chart: {{ include "witself-server.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: witself
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.11.1
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command: ["sh", "-c"]
      args:
        - >
          set -e;
          base="http://{{ include "witself-server.fullname" . }}:{{ .Values.service.port }}";
          curl -fsS "$base/v1/version";
          curl -fsS "$base/v1/capabilities";
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir: {}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "witself-server.fullname" . }}
  labels:
    {{- include "witself-server.labels" . | nindent 4 }}
data:
  # Non-secret server config. Only values witself-server consumes today are set
  # here. Database/bootstrap/provision credentials arrive through explicit
  # Secret refs. Agent-secret AVKs remain client-custodied, so the backend has
  # no sealed-plane KMS or decrypt-key configuration. See ADR 0003.
  WITSELF_API_ADDR: ":{{ .Values.server.port }}"
  WITSELF_HEALTH_ADDR: ":{{ .Values.health.port }}"
  WITSELF_METRICS_ADDR: ":{{ .Values.metrics.port }}"
  WITSELF_BACKEND_KIND: {{ .Values.backend.kind | quote }}
  WITSELF_FACT_DELETION_ENABLED: {{ .Values.features.factDeletion.enabled | quote }}
  WITSELF_AVATAR_PAYLOAD_COMPACTION_ENABLED: {{ .Values.avatar.payloadCompaction.enabled | quote }}
  WITSELF_AVATAR_STYLE_ROLLOUT_ENABLED: {{ .Values.avatar.styleRollout.enabled | quote }}
  WITSELF_AVATAR_STYLE_ROLLOUT_BATCH_SIZE: {{ .Values.avatar.styleRollout.batchSize | quote }}
  WITSELF_AVATAR_STYLE_ROLLOUT_INTERVAL: {{ .Values.avatar.styleRollout.interval | quote }}
  WITSELF_AVATAR_STYLE_ROLLOUT_BATCH_TIMEOUT: {{ .Values.avatar.styleRollout.batchTimeout | quote }}

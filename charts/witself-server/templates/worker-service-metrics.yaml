{{- if and .Values.worker.enabled .Values.worker.metrics.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "witself-server.workerMetricsFullname" . }}
  labels:
    {{- include "witself-server.workerLabels" . | nindent 4 }}
  {{- with .Values.worker.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "witself-server.workerSelectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.worker.metrics.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}

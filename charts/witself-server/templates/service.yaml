apiVersion: v1
kind: Service
metadata:
  name: {{ include "witself-server.fullname" . }}
  labels:
    {{- include "witself-server.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "witself-server.selectorLabels" . | nindent 4 }}
  ports:
    # API only. Health and metrics are reached on their own ports/services so
    # they are never exposed through the public API service.
    - name: api
      port: {{ .Values.service.port }}
      targetPort: api
      protocol: TCP

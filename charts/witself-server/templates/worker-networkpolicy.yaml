{{- if and .Values.worker.enabled .Values.worker.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "witself-server.workerFullname" . }}
  labels:
    {{- include "witself-server.workerLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "witself-server.workerSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Health is open for kubelet probes; no Service exposes it.
    - ports:
        - port: health
          protocol: TCP
    - ports:
        - port: metrics
          protocol: TCP
      {{- with .Values.worker.networkPolicy.metricsFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

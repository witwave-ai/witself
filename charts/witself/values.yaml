# Default values for the witself chart.
#
# This chart deploys witself-server (the backend API), NOT the witself CLI.
#
# Safety posture: values reference EXISTING Kubernetes Secrets. Raw secrets
# (database passwords, embedding-provider API keys, KMS credentials, blob-store
# credentials, tokens) are never placed in this file or in any rendered
# manifest. See docs/helm-chart.md "Secrets And Config".

# -- Number of witself-server replicas. Ignored when autoscaling.enabled is true.
replicaCount: 2

image:
  # -- Server image repository. The chart deploys the server, not the CLI.
  repository: ghcr.io/witwave-ai/images/witself-server
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to .Chart.appVersion when empty.
  tag: ""

# -- Image pull secrets for private registries (list of {name: ...}).
imagePullSecrets: []

# -- Override the chart name used in resource names.
nameOverride: ""
# -- Fully override the generated fullname used in resource names.
fullnameOverride: ""

# Core server configuration. Non-secret values land in the ConfigMap and are
# exposed to the container as WITSELF_-prefixed environment variables.
server:
  # -- API listen address (api port).
  listen: ":8080"
  # -- Public URL used for absolute links; non-secret.
  publicUrl: ""
  # -- Structured log level: debug, info, warn, error.
  logLevel: info
  # -- Termination grace period (seconds) so in-flight messaging/recall drains.
  terminationGracePeriodSeconds: 30
  # -- Extra non-secret WITSELF_ env vars as a map, e.g. {WITSELF_FOO: "bar"}.
  extraEnv: {}
  # -- Extra envFrom sources (configMapRef/secretRef) for operator-owned config.
  extraEnvFrom: []

# Named ports. API, health, and metrics are deliberately separated so the
# health and metrics ports are never exposed through public ingress.
ports:
  # -- API container port.
  api: 8080
  # -- Health/probes container port.
  health: 8081
  # -- Metrics container port.
  metrics: 9090

# Health/probe configuration on the dedicated health port.
health:
  # -- Health listen address (health port).
  listen: ":8081"
  service:
    # -- Render a cluster-internal health Service for diagnostics.
    enabled: false
    # -- Annotations for the health Service.
    annotations: {}

# Prometheus-compatible metrics. Enabled by default; exposed only on the
# dedicated metrics port. Mapped to WITSELF_METRICS_ENABLED.
metrics:
  # -- Enable the metrics endpoint.
  enabled: true
  # -- Metrics listen address (metrics port).
  listen: ":9090"
  # -- Metrics HTTP path.
  path: /metrics
  service:
    # -- Render a dedicated metrics Service.
    enabled: true
    # -- Annotations for the metrics Service.
    annotations: {}
  serviceMonitor:
    # -- Render a Prometheus Operator ServiceMonitor (requires the CRD).
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Extra labels on the ServiceMonitor (e.g. to match a Prometheus selector).
    labels: {}
    # -- Endpoint relabelings.
    relabelings: []
    # -- Endpoint metric relabelings.
    metricRelabelings: []
  podMonitor:
    # -- Render a Prometheus Operator PodMonitor (requires the CRD).
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Extra labels on the PodMonitor.
    labels: {}

# Kubernetes probes against the documented health endpoints on the health port.
probes:
  liveness:
    enabled: true
    path: /v1/health/live
    port: health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    enabled: true
    path: /v1/health/ready
    port: health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  startup:
    enabled: true
    path: /v1/health/startup
    port: health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 30

# External Postgres with the pgvector extension. REQUIRED, operator-owned.
# The connection string is consumed from an existing Secret; the chart never
# holds the database URL or password. pgvector must be available in the target
# database (provisioned out of band / by Terraform).
database:
  existingSecret:
    # -- Name of the existing Secret holding the database URL.
    name: witself-database
    # -- Key within the Secret holding the database URL (mapped to WITSELF_DATABASE_URL).
    urlKey: database-url

# Open-plane embedding provider. The API key is referenced exclusively through
# an existing Secret. For provider "local-dev" no API key is required and the
# existingSecret block can be omitted.
embeddings:
  # -- Provider: voyage (default), openai, or local-dev.
  provider: voyage
  # -- Embedding model; vector dimensionality follows the active model.
  model: voyage-3
  existingSecret:
    # -- Name of the existing Secret holding the embedding-provider API key.
    name: witself-embeddings
    # -- Key within the Secret holding the API key (injected as WITSELF_EMBEDDINGS_API_KEY).
    apiKeyKey: api-key

# Sealed plane (secrets + TOTP). When disabled, no KMS config is required and
# secrets/TOTP are not served. Mapped to WITSELF_SEALED_PLANE_ENABLED.
sealedPlane:
  # -- Enable the sealed plane (secrets + TOTP).
  enabled: true

# KMS provider for sealed-plane envelope encryption
# (CMK -> per-realm KEK -> per-secret/field DEK).
#
# CONSUMED ONLY WHEN sealedPlane.enabled is true. The chart never holds the
# CMK, a KEK, or a DEK. keyRef is a key IDENTIFIER (ARN/resource name/URI), not
# key material. Provider credentials come from an existing Secret (via envFrom)
# or, preferably, cloud workload identity. For provider "local-dev" the secret
# reference can be omitted.
kms:
  # -- Provider: aws-kms, gcp-kms, azure-key-vault, or local-dev.
  provider: aws-kms
  # -- Customer master key identifier (ARN / resource name / key URI). Not key material.
  keyRef: ""
  existingSecret:
    # -- Name of the existing Secret holding KMS provider credentials.
    name: witself-kms
    # -- Inject the entire Secret via envFrom (preferred when set).
    envFrom: true

# Optional external object/blob storage for exports, attachments, and backups.
# Credentials are referenced through an existing Secret only.
blob:
  # -- Enable blob storage configuration.
  enabled: false
  # -- Provider: s3, gcs, azure-blob, or local.
  provider: s3
  # -- Bucket or container name (non-secret).
  bucket: ""
  # -- Region (non-secret).
  region: ""
  # -- Custom endpoint, e.g. for S3-compatible stores (non-secret).
  endpoint: ""
  existingSecret:
    # -- Name of the existing Secret holding blob-store credentials. Empty => workload identity.
    name: ""
    # -- Inject the entire Secret via envFrom.
    envFrom: true

# Audit retention (non-secret), mapped to WITSELF_AUDIT_RETENTION_DAYS.
audit:
  retentionDays: 365

serviceAccount:
  # -- Create a ServiceAccount.
  create: true
  # -- Name of the ServiceAccount; generated when empty.
  name: ""
  # -- Annotations (e.g. IRSA / Workload Identity for Postgres/KMS/embeddings/blob).
  annotations: {}
  # -- Automount the ServiceAccount token. The pod needs no Kubernetes API access.
  automount: false

service:
  # -- API Service type.
  type: ClusterIP
  # -- API Service port.
  port: 8080
  # -- Annotations for the API Service.
  annotations: {}

ingress:
  # -- Render an Ingress for the API port only (never health or metrics).
  enabled: false
  # -- IngressClass name.
  className: ""
  # -- Ingress annotations.
  annotations: {}
  # -- Hosts: list of {host, paths:[{path, pathType}]}.
  hosts: []
  # -- TLS: list of {secretName, hosts:[...]}.
  tls: []

networkPolicy:
  # -- Render a default-deny NetworkPolicy opened only where required.
  enabled: true
  # -- Namespace selector labels allowed to reach the API port.
  apiIngressNamespaceSelector: {}
  # -- Pod selector labels allowed to reach the API port.
  apiIngressPodSelector: {}
  # -- Namespace selector labels allowed to scrape the metrics port (monitoring ns).
  metricsIngressNamespaceSelector: {}
  postgres:
    # -- Egress port to Postgres.
    port: 5432
    # -- CIDR blocks for Postgres egress. Empty => allow all (operator should narrow).
    cidrs: []
  # -- Extra egress rules appended verbatim (e.g. embedding/KMS/blob endpoints).
  extraEgress: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

autoscaling:
  # -- Enable a HorizontalPodAutoscaler (overrides replicaCount).
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # -- Optional target memory utilization percentage.
  targetMemoryUtilizationPercentage: 0

podDisruptionBudget:
  # -- Render a PodDisruptionBudget.
  enabled: true
  # -- Minimum available pods. Mutually exclusive with maxUnavailable.
  minAvailable: 1
  # -- Maximum unavailable pods. Leave empty when using minAvailable.
  maxUnavailable: ""

# Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# -- Pod annotations.
podAnnotations: {}
# -- Pod labels.
podLabels: {}
# -- Node selector.
nodeSelector: {}
# -- Tolerations.
tolerations: []
# -- Affinity rules.
affinity: {}
# -- Topology spread constraints.
topologySpreadConstraints: []

# Migration Job (witself-server migrate). Opt-in and operator-controlled.
# Run before rolling the server. Does not run destructive migrations.
migrations:
  # -- Render the migration Job.
  enabled: false
  # -- Migration command.
  command:
    - witself-server
    - migrate
    - up
  # -- Run as a Helm hook (pre-install,pre-upgrade) instead of a plain Job.
  useHelmHook: false
  # -- TTL (seconds) before a finished Job is cleaned up.
  ttlSecondsAfterFinished: 600
  # -- backoffLimit for the migration Job.
  backoffLimit: 1
  # -- Resources for the migration Job.
  resources: {}

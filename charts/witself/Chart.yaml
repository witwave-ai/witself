apiVersion: v2
name: witself
description: >-
  Witself self-hosted backend (witself-server). Deploys the open plane
  (memories + facts + semantic recall) and, when enabled, the sealed plane
  (secrets + TOTP) backed by KMS envelope encryption. Requires external
  Postgres with the pgvector extension.
type: application
# Chart version: bumped on every chart change.
version: 0.1.0
# appVersion tracks the witself-server image the chart is validated against.
appVersion: "0.1.0"
home: https://github.com/witwave-ai/witself
sources:
  - https://github.com/witwave-ai/witself
keywords:
  - witself
  - memory
  - agents
  - pgvector
  - secrets
maintainers:
  - name: Witwave AI
    url: https://github.com/witwave-ai
annotations:
  # Primary image published alongside this chart.
  artifacthub.io/images: |
    - name: witself-server
      image: ghcr.io/witwave-ai/images/witself-server:0.1.0

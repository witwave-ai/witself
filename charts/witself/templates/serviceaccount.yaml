{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "witself.serviceAccountName" . }}
  labels:
    {{- include "witself.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The pod needs no Kubernetes API access for identity/policy/group/messaging
# operations; the token is not automounted by default.
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}

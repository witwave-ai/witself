{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "witself.fullname" . }}
  labels:
    {{- include "witself.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "witself.selectorLabels" . | nindent 6 }}
  # Default-deny posture: an empty rule set for a policy type denies that type.
  # We open ingress/egress only where required below.
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # API port: reachable from ingress controllers / in-cluster token holders.
    # Inter-agent messaging is server-mediated, so no agent-to-agent rule.
    - from:
        {{- if .Values.networkPolicy.apiIngressNamespaceSelector }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiIngressNamespaceSelector | nindent 14 }}
        {{- end }}
        {{- if .Values.networkPolicy.apiIngressPodSelector }}
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiIngressPodSelector | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.ports.api }}
    {{- if .Values.metrics.enabled }}
    # Metrics port: only from the monitoring namespace / Prometheus scrapers.
    - from:
        {{- if .Values.networkPolicy.metricsIngressNamespaceSelector }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.metricsIngressNamespaceSelector | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.ports.metrics }}
    {{- end }}
    # Health port: only from the kubelet / cluster-internal diagnostics. The
    # kubelet sources from the node, which a from-less rule (same effect as a
    # namespaced allow) cannot universally pin; allow the port cluster-wide but
    # never via public ingress (no Ingress object targets it).
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.health }}
  egress:
    # DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Egress to Postgres (pgvector) — the system of record.
    - to:
        {{- range .Values.networkPolicy.postgres.cidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
    {{- if eq (include "witself.embeddingsExternal" .) "true" }}
    # Egress to the embedding provider (e.g. voyage/openai). Explicit and
    # reviewable; the local-dev provider needs no egress (rule omitted).
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- if eq (include "witself.kmsExternal" .) "true" }}
    # Egress to the KMS endpoint — only when the sealed plane is enabled and the
    # provider is not local-dev. Used for envelope encryption and reveal.
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    # Operator-supplied extra egress (blob storage, billing, etc.).
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}

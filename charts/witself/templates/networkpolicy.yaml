{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "witself.fullname" . }}
  labels:
    {{- include "witself.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "witself.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Health port: always open so kubelet probes are never blocked.
    - ports:
        - port: health
          protocol: TCP
    # API port: from any in-cluster source unless apiFrom narrows it.
    - ports:
        - port: api
          protocol: TCP
      {{- with .Values.networkPolicy.apiFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if .Values.metrics.enabled }}
    # Metrics port: from any source unless metricsFrom narrows it (e.g. monitoring).
    - ports:
        - port: metrics
          protocol: TCP
      {{- with .Values.networkPolicy.metricsFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}

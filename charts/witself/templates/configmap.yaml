apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "witself.fullname" . }}
  labels:
    {{- include "witself.labels" . | nindent 4 }}
data:
  # Non-secret server configuration only. Secret material (database URL,
  # embedding API key, KMS/blob credentials) is NEVER written here; it is
  # injected from existing Secrets via valueFrom/envFrom in the Deployment.
  WITSELF_LISTEN: {{ .Values.server.listen | quote }}
  WITSELF_HEALTH_LISTEN: {{ .Values.health.listen | quote }}
  WITSELF_METRICS_ENABLED: {{ .Values.metrics.enabled | quote }}
  WITSELF_METRICS_LISTEN: {{ .Values.metrics.listen | quote }}
  WITSELF_METRICS_PATH: {{ .Values.metrics.path | quote }}
  WITSELF_LOG_LEVEL: {{ .Values.server.logLevel | quote }}
  WITSELF_SEALED_PLANE_ENABLED: {{ .Values.sealedPlane.enabled | quote }}
  WITSELF_EMBEDDINGS_PROVIDER: {{ .Values.embeddings.provider | quote }}
  WITSELF_EMBEDDINGS_MODEL: {{ .Values.embeddings.model | quote }}
  WITSELF_AUDIT_RETENTION_DAYS: {{ .Values.audit.retentionDays | quote }}
  {{- with .Values.server.publicUrl }}
  WITSELF_PUBLIC_URL: {{ . | quote }}
  {{- end }}
  {{- if .Values.sealedPlane.enabled }}
  WITSELF_KMS_PROVIDER: {{ .Values.kms.provider | quote }}
  {{- with .Values.kms.keyRef }}
  WITSELF_KMS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.blob.enabled }}
  WITSELF_BLOB_PROVIDER: {{ .Values.blob.provider | quote }}
  {{- with .Values.blob.bucket }}
  WITSELF_BLOB_BUCKET: {{ . | quote }}
  {{- end }}
  {{- with .Values.blob.region }}
  WITSELF_BLOB_REGION: {{ . | quote }}
  {{- end }}
  {{- with .Values.blob.endpoint }}
  WITSELF_BLOB_ENDPOINT: {{ . | quote }}
  {{- end }}
  {{- end }}

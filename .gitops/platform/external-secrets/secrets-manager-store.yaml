# External Secrets reads AWS Secrets Manager with the controller pod's EKS Pod
# Identity credentials. No auth block is needed here.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2

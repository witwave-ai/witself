# External Secrets Operator — installed via GitOps from its upstream Helm chart.
# The platform-tier Application (.gitops/bootstrap/platform.yaml) discovers this
# file and syncs it.
#
# It runs idle until a SecretStore + ExternalSecret are added; ESO authenticates
# to AWS Secrets Manager via the EKS Pod Identity association that
# `witself-infra up -argocd` creates (no static credentials).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0
    helm:
      values: |
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

{{- $valuesPath := default (printf ".gitops/cells/%s/values.yaml" (required "cell.name is required" .Values.cell.name)) .Values.gitops.valuesPath -}}
{{- $certARN := default "" .Values.cell.tlsCertificateARN -}}
{{- $externalDNSAnnotations := default dict .Values.platform.externalDNS.serviceAccountAnnotations -}}
{{- $externalDNSLabels := default dict .Values.platform.externalDNS.serviceAccountLabels -}}
{{- $externalDNSPodLabels := default dict .Values.platform.externalDNS.podLabels -}}
{{- $externalDNSAzureConfig := default dict .Values.platform.externalDNS.azureConfig -}}
{{- $externalDNSExtraArgs := default dict .Values.platform.externalDNS.extraArgs -}}
{{- $externalDNSExtraVolumes := default (list) .Values.platform.externalDNS.extraVolumes -}}
{{- $externalDNSExtraVolumeMounts := default (list) .Values.platform.externalDNS.extraVolumeMounts -}}
{{- $certManagerAnnotations := default dict .Values.platform.certManager.serviceAccountAnnotations -}}
{{- $certManagerPodLabels := default dict .Values.platform.certManager.podLabels -}}
{{- $externalSecretsAnnotations := default dict .Values.platform.externalSecrets.serviceAccountAnnotations -}}
{{- $azureVaultURL := default "" .Values.platform.externalSecrets.azureVaultURL -}}
{{- $platformRuntimeValues := dict -}}
{{- $platformRuntime := dict -}}
{{- if $certARN -}}
{{- $_ := set $platformRuntime "awsAlbIngress" (dict "certificateARNs" (list $certARN) "listeners" (list (dict "protocol" "HTTP" "port" 80) (dict "protocol" "HTTPS" "port" 443))) -}}
{{- end -}}
{{- $externalDNSRuntime := dict -}}
{{- if .Values.platform.externalDNS.enabled -}}
{{- $_ := set $externalDNSRuntime "enabled" true -}}
{{- end -}}
{{- if $externalDNSAnnotations -}}
{{- $_ := set $externalDNSRuntime "serviceAccountAnnotations" $externalDNSAnnotations -}}
{{- end -}}
{{- if $externalDNSLabels -}}
{{- $_ := set $externalDNSRuntime "serviceAccountLabels" $externalDNSLabels -}}
{{- end -}}
{{- if $externalDNSPodLabels -}}
{{- $_ := set $externalDNSRuntime "podLabels" $externalDNSPodLabels -}}
{{- end -}}
{{- if $externalDNSAzureConfig -}}
{{- $_ := set $externalDNSRuntime "azureConfig" $externalDNSAzureConfig -}}
{{- end -}}
{{- if $externalDNSExtraArgs -}}
{{- $_ := set $externalDNSRuntime "extraArgs" $externalDNSExtraArgs -}}
{{- end -}}
{{- if $externalDNSExtraVolumes -}}
{{- $_ := set $externalDNSRuntime "extraVolumes" $externalDNSExtraVolumes -}}
{{- end -}}
{{- if $externalDNSExtraVolumeMounts -}}
{{- $_ := set $externalDNSRuntime "extraVolumeMounts" $externalDNSExtraVolumeMounts -}}
{{- end -}}
{{- if $externalDNSRuntime -}}
{{- $_ := set $platformRuntime "externalDNS" $externalDNSRuntime -}}
{{- end -}}
{{- if or $certManagerAnnotations $certManagerPodLabels -}}
{{- $certManagerRuntime := dict -}}
{{- if $certManagerAnnotations -}}
{{- $_ := set $certManagerRuntime "serviceAccountAnnotations" $certManagerAnnotations -}}
{{- end -}}
{{- if $certManagerPodLabels -}}
{{- $_ := set $certManagerRuntime "podLabels" $certManagerPodLabels -}}
{{- end -}}
{{- $_ := set $platformRuntime "certManager" $certManagerRuntime -}}
{{- end -}}
{{- if or $azureVaultURL $externalSecretsAnnotations -}}
{{- $externalSecretsRuntime := dict -}}
{{- if $azureVaultURL -}}
{{- $_ := set $externalSecretsRuntime "azureVaultURL" $azureVaultURL -}}
{{- end -}}
{{- if $externalSecretsAnnotations -}}
{{- $_ := set $externalSecretsRuntime "serviceAccountAnnotations" $externalSecretsAnnotations -}}
{{- end -}}
{{- $_ := set $platformRuntime "externalSecrets" $externalSecretsRuntime -}}
{{- end -}}
{{- if $platformRuntime -}}
{{- $_ := set $platformRuntimeValues "cell" (dict "tlsCertificateARN" $certARN) -}}
{{- $_ := set $platformRuntimeValues "platform" $platformRuntime -}}
{{- end -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    witself.io/cell: {{ required "cell.name is required" .Values.cell.name | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.gitops.project | quote }}
  sources:
    - repoURL: {{ .Values.gitops.repoURL | quote }}
      targetRevision: {{ .Values.gitops.targetRevision | quote }}
      path: .gitops/charts/platform
      helm:
        valueFiles:
          - {{ printf "$values/%s" $valuesPath | quote }}
        {{- if $platformRuntimeValues }}
        values: |
{{ toYaml $platformRuntimeValues | nindent 10 }}
        {{- end }}
    - repoURL: {{ .Values.gitops.repoURL | quote }}
      targetRevision: {{ .Values.gitops.targetRevision | quote }}
      ref: values
  destination:
    server: {{ .Values.gitops.destinationServer | quote }}
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 20
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - SkipDryRunOnMissingResource=true

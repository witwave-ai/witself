cell:
  name: ""
  cloud: ""
  region: ""
  domain: ""
  apiHost: ""
  tlsCertificateARN: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  valuesPath: ""
  destinationServer: https://kubernetes.default.svc

platform:
  awsAlbIngress:
    enabled: false
    certificateARNs: []
    listeners: []
  externalDNS:
    enabled: false
    chartRepoURL: https://kubernetes-sigs.github.io/external-dns/
    chartName: external-dns
    chartVersion: 1.21.1
    namespace: external-dns
    serviceAccountName: external-dns
    serviceAccountLabels: {}
    serviceAccountAnnotations: {}
    podLabels: {}
    sources:
      - ingress
    policy: sync
    registry: txt
    txtOwnerId: ""
    domainFilters: []
    interval: 1m
    provider:
      name: aws
    extraArgs: {}
    extraVolumes: []
    extraVolumeMounts: []
    azureConfig:
      enabled: false
      secretName: external-dns-azure
      tenantId: ""
      subscriptionId: ""
      resourceGroup: ""
  externalSecrets:
    enabled: true
    chartRepoURL: https://charts.external-secrets.io
    chartName: external-secrets
    chartVersion: 2.7.0
    namespace: external-secrets
    installCRDs: true
    storeName: aws
    secretsManagerRegion: ""

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartRepoURL: ghcr.io/witwave-ai/charts
    chartName: witself-server
    chartVersion: 0.0.45
    imageTag: 0.0.45
    backendKind: managed
    secrets:
      database:
        enabled: true
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h

{{- if and .Values.platform.externalSecrets.enabled (eq .Values.cell.cloud "gcp") }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.platform.externalSecrets.storeName | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    gcpsm:
      projectID: {{ required "platform.externalSecrets.gcpProjectID is required for GCP cells" .Values.platform.externalSecrets.gcpProjectID | quote }}
{{- end }}

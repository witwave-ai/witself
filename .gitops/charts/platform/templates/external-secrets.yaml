{{- if .Values.platform.externalSecrets.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    witself.io/cell: {{ required "cell.name is required" .Values.cell.name | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.gitops.project | quote }}
  source:
    repoURL: {{ .Values.platform.externalSecrets.chartRepoURL | quote }}
    chart: {{ .Values.platform.externalSecrets.chartName | quote }}
    targetRevision: {{ required "platform.externalSecrets.chartVersion is required" .Values.platform.externalSecrets.chartVersion | quote }}
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: {{ .Values.platform.externalSecrets.installCRDs }}
        serviceAccount:
          create: true
          name: {{ .Values.platform.externalSecrets.serviceAccountName | quote }}
          annotations:
{{ toYaml .Values.platform.externalSecrets.serviceAccountAnnotations | nindent 12 }}
  destination:
    server: {{ .Values.gitops.destinationServer | quote }}
    namespace: {{ .Values.platform.externalSecrets.namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}

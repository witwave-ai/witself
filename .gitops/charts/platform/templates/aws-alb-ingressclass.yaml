{{- if and .Values.platform.awsAlbIngress.enabled (eq .Values.cell.cloud "aws") }}
{{- $className := required "platform.awsAlbIngress.className is required" .Values.platform.awsAlbIngress.className -}}
apiVersion: eks.amazonaws.com/v1
kind: IngressClassParams
metadata:
  name: {{ $className | quote }}
  labels:
    witself.io/cell: {{ required "cell.name is required" .Values.cell.name | quote }}
spec:
  scheme: {{ required "platform.awsAlbIngress.scheme is required" .Values.platform.awsAlbIngress.scheme | quote }}
  ipAddressType: {{ required "platform.awsAlbIngress.ipAddressType is required" .Values.platform.awsAlbIngress.ipAddressType | quote }}
  {{- with .Values.platform.awsAlbIngress.groupName }}
  group:
    name: {{ . | quote }}
  {{- end }}
  {{- with .Values.platform.awsAlbIngress.listeners }}
  listeners:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.platform.awsAlbIngress.certificateARNs }}
  certificateARNs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: {{ $className | quote }}
  labels:
    witself.io/cell: {{ required "cell.name is required" .Values.cell.name | quote }}
spec:
  controller: eks.amazonaws.com/alb
  parameters:
    apiGroup: eks.amazonaws.com
    kind: IngressClassParams
    name: {{ $className | quote }}
{{- end }}

{{- if and .Values.platform.externalSecrets.enabled (eq .Values.cell.cloud "aws") }}
{{- $region := default .Values.cell.region .Values.platform.externalSecrets.secretsManagerRegion -}}
# External Secrets reads AWS Secrets Manager with the controller pod's EKS Pod
# Identity credentials. No auth block is needed here.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.platform.externalSecrets.storeName | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ required "platform.externalSecrets.secretsManagerRegion or cell.region is required" $region | quote }}
{{- end }}

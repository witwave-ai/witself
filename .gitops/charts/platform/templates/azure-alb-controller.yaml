{{- $controller := default dict .Values.platform.azureAlbController -}}
{{- if and $controller.enabled (eq .Values.cell.cloud "azure") }}
{{- $podIdentity := default dict $controller.podIdentity -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: azure-alb-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    witself.io/cell: {{ required "cell.name is required" .Values.cell.name | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.gitops.project | quote }}
  source:
    repoURL: {{ required "platform.azureAlbController.chartRepoURL is required" $controller.chartRepoURL | quote }}
    chart: {{ default "alb-controller" $controller.chartName | quote }}
    targetRevision: {{ required "platform.azureAlbController.chartVersion is required" $controller.chartVersion | quote }}
    helm:
      releaseName: alb-controller
      values: |
        albController:
          namespace: {{ default "azure-alb-system" $controller.controllerNamespace | quote }}
          podIdentity:
            clientID: {{ required "platform.azureAlbController.podIdentity.clientID is required for Azure ALB Controller" $podIdentity.clientID | quote }}
  destination:
    server: {{ .Values.gitops.destinationServer | quote }}
    namespace: {{ default "azure-alb-system" $controller.namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}

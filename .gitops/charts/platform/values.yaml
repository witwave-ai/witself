cell:
  name: ""
  cloud: ""
  region: ""
  domain: ""
  apiHost: ""
  tlsCertificateARN: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  destinationServer: https://kubernetes.default.svc

platform:
  awsAlbIngress:
    enabled: false
    className: alb
    scheme: internet-facing
    ipAddressType: ipv4
    groupName: witself-public
    listeners:
      - protocol: HTTP
        port: 80
    certificateARNs: []
  certManager:
    enabled: true
    chartRepoURL: https://charts.jetstack.io
    chartName: cert-manager
    chartVersion: v1.20.3
    namespace: cert-manager
    enableGatewayAPI: false
    serviceAccountAnnotations: {}
    podLabels: {}
    ignoreWebhookConfigurationDifferences: false
    crds:
      enabled: true
      keep: true
  externalDNS:
    enabled: false
    chartRepoURL: https://kubernetes-sigs.github.io/external-dns/
    chartName: external-dns
    chartVersion: 1.21.1
    namespace: external-dns
    serviceAccountName: external-dns
    serviceAccountLabels: {}
    serviceAccountAnnotations: {}
    podLabels: {}
    sources:
      - ingress
    policy: sync
    registry: txt
    txtOwnerId: ""
    domainFilters: []
    interval: 1m
    provider:
      name: aws
    extraArgs: {}
    extraVolumes: []
    extraVolumeMounts: []
    azureConfig:
      enabled: false
      secretName: external-dns-azure
      tenantId: ""
      subscriptionId: ""
      resourceGroup: ""
  externalSecrets:
    enabled: true
    chartRepoURL: https://charts.external-secrets.io
    chartName: external-secrets
    chartVersion: 2.7.0
    namespace: external-secrets
    installCRDs: true
    serviceAccountName: external-secrets
    serviceAccountAnnotations: {}
    serviceAccountLabels: {}
    podLabels: {}
    storeName: aws
    secretsManagerRegion: ""
    gcpProjectID: ""
    azureVaultURL: ""
    azureServiceAccountRefName: ""
    azureServiceAccountRefNamespace: ""
  keda:
    enabled: true
    chartRepoURL: https://kedacore.github.io/charts
    chartName: keda
    chartVersion: 2.20.1
    namespace: keda
    installCRDs: true
    ignoreDeploymentResourceDifferences: false
    ignoreWebhookConfigurationDifferences: false
  metricsServer:
    enabled: true
    chartRepoURL: https://kubernetes-sigs.github.io/metrics-server/
    chartName: metrics-server
    chartVersion: 3.13.1
    namespace: kube-system
    replicas: 2

cell:
  name: ""
  region: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  destinationServer: https://kubernetes.default.svc

platform:
  awsAlbIngress:
    enabled: false
    className: alb
    scheme: internet-facing
    ipAddressType: ipv4
    groupName: witself-public
    listeners:
      - protocol: HTTP
        port: 80
    certificateARNs: []
    tags: []
  certManager:
    enabled: true
    chartRepoURL: https://charts.jetstack.io
    chartName: cert-manager
    chartVersion: v1.20.3
    namespace: cert-manager
    crds:
      enabled: true
      keep: true
  externalSecrets:
    enabled: true
    chartRepoURL: https://charts.external-secrets.io
    chartName: external-secrets
    chartVersion: 2.7.0
    namespace: external-secrets
    installCRDs: true
    storeName: aws
    secretsManagerRegion: ""
  keda:
    enabled: true
    chartRepoURL: https://kedacore.github.io/charts
    chartName: keda
    chartVersion: 2.20.1
    namespace: keda
    installCRDs: true
  metricsServer:
    enabled: true
    chartRepoURL: https://kubernetes-sigs.github.io/metrics-server/
    chartName: metrics-server
    chartVersion: 3.13.1
    namespace: kube-system
    replicas: 2

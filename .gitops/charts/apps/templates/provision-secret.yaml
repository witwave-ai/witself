{{- if and .Values.apps.witselfServer.enabled .Values.apps.witselfServer.secrets.provision.enabled }}
{{- $provision := .Values.apps.witselfServer.secrets.provision -}}
{{- $remoteKeySuffix := default "provision/token" $provision.remoteKeySuffix -}}
{{- $remoteKey := default (printf "%s/%s" (required "cell.name is required" .Values.cell.name) $remoteKeySuffix) $provision.remoteKey -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ default "witself-provision" $provision.targetName | quote }}
  namespace: {{ .Values.apps.witselfServer.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ default "1h" $provision.refreshInterval | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ default "aws" $provision.storeName | quote }}
  target:
    name: {{ default "witself-provision" $provision.targetName | quote }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $remoteKey | quote }}
{{- end }}

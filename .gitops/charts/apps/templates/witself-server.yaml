{{- if .Values.apps.witselfServer.enabled }}
{{- $bootstrap := .Values.apps.witselfServer.secrets.bootstrap -}}
{{- $db := .Values.apps.witselfServer.secrets.database -}}
{{- $bootstrapTargetName := default "witself-bootstrap" $bootstrap.targetName -}}
{{- $bootstrapMountPath := default (printf "/.witself/tokens/%s/bootstrap.token" (required "cell.name is required" .Values.cell.name)) $bootstrap.mountPath -}}
{{- $targetName := default "witself-db" $db.targetName -}}
{{- $emailPilot := .Values.apps.witselfServer.agentEmail.receivePilot -}}
{{- if $emailPilot.enabled -}}
{{- $agentCount := len $emailPilot.agentIDs -}}
{{- if or (lt $agentCount 5) (gt $agentCount 10) -}}
{{- fail "apps.witselfServer.agentEmail.receivePilot.agentIDs must contain 5-10 agent IDs when enabled" -}}
{{- end -}}
{{- $_ := required "apps.witselfServer.agentEmail.receivePilot.domain is required when enabled" $emailPilot.domain -}}
{{- $_ := required "apps.witselfServer.agentEmail.receivePilot.audience is required when enabled" $emailPilot.audience -}}
{{- $_ := required "apps.witselfServer.agentEmail.receivePilot.realmID is required when enabled" $emailPilot.realmID -}}
{{- $_ := required "apps.witselfServer.agentEmail.receivePilot.relayPublicKeysJSON is required when enabled" $emailPilot.relayPublicKeysJSON -}}
{{- $_ := required "apps.witselfServer.agentEmail.receivePilot.relayReplayWindow is required when enabled" $emailPilot.relayReplayWindow -}}
{{- $seenAgentIDs := dict -}}
{{- range $agentID := $emailPilot.agentIDs -}}
{{- if not (regexMatch "^agent_[a-z2-7]{16}$" $agentID) -}}
{{- fail (printf "apps.witselfServer.agentEmail.receivePilot.agentIDs contains invalid agent ID %q" $agentID) -}}
{{- end -}}
{{- if hasKey $seenAgentIDs $agentID -}}
{{- fail (printf "apps.witselfServer.agentEmail.receivePilot.agentIDs contains duplicate agent ID %q" $agentID) -}}
{{- end -}}
{{- $_ := set $seenAgentIDs $agentID true -}}
{{- end -}}
{{- if $emailPilot.retryCanaryAgentID -}}
{{- if not (hasKey $seenAgentIDs $emailPilot.retryCanaryAgentID) -}}
{{- fail "apps.witselfServer.agentEmail.receivePilot.retryCanaryAgentID must equal one enrolled agent ID" -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- $serverEmailPilot := dict "enabled" $emailPilot.enabled "domain" $emailPilot.domain "audience" $emailPilot.audience "realmID" $emailPilot.realmID "agentIDs" $emailPilot.agentIDs "retryCanaryAgentID" $emailPilot.retryCanaryAgentID "relayPublicKeysJSON" $emailPilot.relayPublicKeysJSON "relayReplayWindow" $emailPilot.relayReplayWindow -}}
{{- $serverValues := dict "backend" (dict "kind" .Values.apps.witselfServer.backendKind) "features" (dict "factDeletion" (dict "enabled" .Values.apps.witselfServer.factDeletionEnabled)) "agentEmail" (dict "receivePilot" $serverEmailPilot) "avatar" (dict "payloadCompaction" (dict "enabled" .Values.apps.witselfServer.avatarPayloadCompactionEnabled) "styleRollout" .Values.apps.witselfServer.avatarStyleRollout) "transcriptRetention" .Values.apps.witselfServer.transcriptRetention "image" (dict "tag" .Values.apps.witselfServer.imageTag) "database" (dict "existingSecret" (dict "name" $targetName "urlKey" $db.urlKey)) -}}
{{- $_ := set $serverValues "replicaCount" .Values.apps.witselfServer.replicaCount -}}
{{- $_ := set $serverValues "minReadySeconds" .Values.apps.witselfServer.minReadySeconds -}}
{{- $_ := set $serverValues "strategy" .Values.apps.witselfServer.strategy -}}
{{- $_ := set $serverValues "lifecycle" .Values.apps.witselfServer.lifecycle -}}
{{- $_ := set $serverValues "terminationGracePeriodSeconds" .Values.apps.witselfServer.terminationGracePeriodSeconds -}}
{{- $_ := set $serverValues "podDisruptionBudget" .Values.apps.witselfServer.podDisruptionBudget -}}
{{- $_ := set $serverValues "topologySpreadConstraints" .Values.apps.witselfServer.topologySpreadConstraints -}}
{{- if and .Values.apps.witselfServer.awsAlbIngress.enabled (eq .Values.cell.cloud "aws") -}}
{{- $_ := set $serverValues "ingress" .Values.apps.witselfServer.awsAlbIngress -}}
{{- end -}}
{{- if and .Values.apps.witselfServer.gcpIngress.enabled (eq .Values.cell.cloud "gcp") -}}
{{- $gcpIngress := .Values.apps.witselfServer.gcpIngress -}}
{{- $frontendConfig := default dict $gcpIngress.frontendConfig -}}
{{- $ingressAnnotations := deepCopy $gcpIngress.annotations -}}
{{- $_ := set $ingressAnnotations "kubernetes.io/ingress.class" "gce" -}}
{{- $_ := set $ingressAnnotations "networking.gke.io/managed-certificates" (default "witself-api" $gcpIngress.managedCertificateName) -}}
{{- if $frontendConfig.enabled -}}
{{- $_ := set $ingressAnnotations "networking.gke.io/v1beta1.FrontendConfig" (default "witself-api" $frontendConfig.name) -}}
{{- end -}}
{{- if $gcpIngress.staticIPName -}}
{{- $_ := set $ingressAnnotations "kubernetes.io/ingress.global-static-ip-name" $gcpIngress.staticIPName -}}
{{- end -}}
{{- if .Values.cell.apiHost -}}
{{- $_ := set $ingressAnnotations "external-dns.alpha.kubernetes.io/hostname" .Values.cell.apiHost -}}
{{- end -}}
{{- $ingressHosts := $gcpIngress.hosts -}}
{{- if .Values.cell.apiHost -}}
{{- $ingressHosts = list (dict "host" .Values.cell.apiHost "paths" (list (dict "path" "/*" "pathType" "ImplementationSpecific"))) -}}
{{- end -}}
{{- $_ := set $serverValues "ingress" (dict "enabled" true "annotations" $ingressAnnotations "hosts" $ingressHosts "tls" (list)) -}}
{{- $_ := set $serverValues "service" (dict "annotations" (dict "cloud.google.com/backend-config" (printf "{\"ports\":{\"80\":\"%s\"}}" (default "witself-server" $gcpIngress.backendConfigName)) "cloud.google.com/neg" "{\"ingress\": true}")) -}}
{{- end -}}
{{- if $bootstrap.enabled -}}
{{- $_ := set $serverValues "bootstrap" (dict "tokenFile" $bootstrapMountPath "existingSecret" (dict "name" $bootstrapTargetName "tokenKey" $bootstrap.tokenKey "ttlKey" $bootstrap.ttlKey)) -}}
{{- end -}}
{{- $provision := .Values.apps.witselfServer.secrets.provision -}}
{{- if $provision.enabled -}}
{{- $_ := set $serverValues "provision" (dict "existingSecret" (dict "name" (default "witself-provision" $provision.targetName) "tokenKey" (default "token" $provision.tokenKey))) -}}
{{- end -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: witself-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    witself.io/cell: {{ required "cell.name is required" .Values.cell.name | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.gitops.project | quote }}
  source:
    repoURL: {{ .Values.apps.witselfServer.chartRepoURL | quote }}
    chart: {{ .Values.apps.witselfServer.chartName | quote }}
    targetRevision: {{ required "apps.witselfServer.chartVersion is required" .Values.apps.witselfServer.chartVersion | quote }}
    helm:
      releaseName: witself-server
      values: |
{{ toYaml $serverValues | nindent 8 }}
  destination:
    server: {{ .Values.gitops.destinationServer | quote }}
    namespace: {{ .Values.apps.witselfServer.namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}

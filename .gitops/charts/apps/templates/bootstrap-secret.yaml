{{- if and .Values.apps.witselfServer.enabled .Values.apps.witselfServer.secrets.bootstrap.enabled }}
{{- $bootstrap := .Values.apps.witselfServer.secrets.bootstrap -}}
{{- $remoteKeySuffix := default "bootstrap/operator-token" $bootstrap.remoteKeySuffix -}}
{{- $remoteKey := default (printf "%s/%s" (required "cell.name is required" .Values.cell.name) $remoteKeySuffix) $bootstrap.remoteKey -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ default "witself-bootstrap" $bootstrap.targetName | quote }}
  namespace: {{ .Values.apps.witselfServer.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ default "1h" $bootstrap.refreshInterval | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ default "aws" $bootstrap.storeName | quote }}
  target:
    name: {{ default "witself-bootstrap" $bootstrap.targetName | quote }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $remoteKey | quote }}
{{- end }}

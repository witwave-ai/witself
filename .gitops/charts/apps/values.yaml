cell:
  name: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  destinationServer: https://kubernetes.default.svc

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartRepoURL: ghcr.io/witwave-ai/charts
    chartName: witself-server
    chartVersion: 0.0.45
    imageTag: 0.0.45
    backendKind: managed
    replicaCount: 1
    minReadySeconds: 10
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    lifecycle:
      preStopSleepSeconds: 0
    terminationGracePeriodSeconds: 30
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
    topologySpreadConstraints: []
    # Keep permanent deletion disabled through the schema-27 compatibility
    # rollout and the schema-28 activation rollout. Enable it only after every
    # writer has converged on schema-28-compatible code.
    factDeletionEnabled: false
    # Receive-only agent-email pilot. Default off in every cell. Only public
    # relay verification keys belong here; the relay private key remains in the
    # isolated Cloudflare Worker secret.
    agentEmail:
      receivePilot:
        enabled: false
        domain: ""
        audience: ""
        realmID: ""
        agentIDs: []
        retryCanaryAgentID: ""
        relayPublicKeysJSON: ""
        relayReplayWindow: 5m
    # Expand/activate gate for irreversible avatar creative-payload cleanup.
    # Keep false in the version rollout; flip only after all old writers drain.
    avatarPayloadCompactionEnabled: false
    # Pin the bounded style-rollout worker in every managed cell instead of
    # inheriting mutable downstream chart defaults.
    avatarStyleRollout:
      enabled: true
      batchSize: 100
      interval: 2s
      batchTimeout: 30s
    # Keep retention disabled during the code/schema rollout. The first
    # config-only activation uses preview; enforcement is a later explicit
    # config-only change after preview counts are reviewed.
    transcriptRetention:
      enabled: false
      mode: preview
      batchSize: 100
      interval: 5m
    awsAlbIngress:
      enabled: false
      className: alb
      annotations: {}
      hosts:
        - paths:
            - path: /
              pathType: Prefix
      tls: []
    gcpIngress:
      enabled: false
      managedCertificateName: witself-api
      backendConfigName: witself-server
      frontendConfig:
        enabled: false
        name: witself-api
        redirectToHttps:
          enabled: true
          responseCodeName: PERMANENT_REDIRECT
      staticIPName: ""
      annotations: {}
      hosts:
        - paths:
            - path: /*
              pathType: ImplementationSpecific
      backendConfig:
        healthCheck:
          checkIntervalSec: 10
          timeoutSec: 5
          healthyThreshold: 1
          unhealthyThreshold: 3
          type: HTTP
          requestPath: /readyz
          port: 8081
    azureGateway:
      enabled: false
      albNamespace: azure-alb-system
      albName: witself-api
      albSubnetID: ""
      gatewayName: witself-api
      gatewayClassName: azure-alb-external
      hostname: ""
      serviceName: witself-server
      servicePort: 80
      http:
        enabled: true
      https:
        enabled: false
        certificate:
          enabled: false
          secretName: witself-api-tls
          issuerRef:
            kind: ClusterIssuer
            name: letsencrypt-prod
          acme:
            enabled: false
            email: ""
            server: https://acme-v02.api.letsencrypt.org/directory
            privateKeySecretName: letsencrypt-prod-private-key
            solver: http01
            dns01:
              azureDNS:
                hostedZoneName: ""
                resourceGroupName: ""
                subscriptionID: ""
                environment: AzurePublicCloud
                managedIdentity:
                  clientID: ""
                  tenantID: ""
    secrets:
      bootstrap:
        enabled: true
        remoteKeySuffix: bootstrap/operator-token
        targetName: witself-bootstrap
        tokenKey: token
        ttlKey: ttl
        mountPath: ""
        refreshInterval: 1h
        storeName: aws
      database:
        enabled: true
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h
        storeName: aws
      provision:
        # The cell's account-provisioning token (control-plane trust link).
        # Disabled by default: self-hosted cells never provision accounts.
        enabled: false
        remoteKeySuffix: provision/token
        targetName: witself-provision
        tokenKey: token
        refreshInterval: 1h
        storeName: aws

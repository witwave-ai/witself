cell:
  name: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  destinationServer: https://kubernetes.default.svc

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartRepoURL: ghcr.io/witwave-ai/charts
    chartName: witself-server
    chartVersion: 0.0.45
    imageTag: 0.0.45
    backendKind: managed
    awsAlbIngress:
      enabled: false
      className: alb
      annotations: {}
      hosts:
        - paths:
            - path: /
              pathType: Prefix
      tls: []
    secrets:
      bootstrap:
        enabled: true
        remoteKeySuffix: bootstrap/operator-token
        targetName: witself-bootstrap
        tokenKey: token
        ttlKey: ttl
        mountPath: ""
        refreshInterval: 1h
        storeName: aws
      database:
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h
        storeName: aws
      provision:
        # The cell's account-provisioning token (control-plane trust link).
        # Disabled by default: self-hosted cells never provision accounts.
        enabled: false
        remoteKeySuffix: provision/token
        targetName: witself-provision
        tokenKey: token
        refreshInterval: 1h
        storeName: aws

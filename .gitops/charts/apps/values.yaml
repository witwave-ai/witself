cell:
  name: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  destinationServer: https://kubernetes.default.svc

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartRepoURL: ghcr.io/witwave-ai/charts
    chartName: witself-server
    chartVersion: 0.0.45
    imageTag: 0.0.45
    backendKind: managed
    awsAlbIngress:
      enabled: false
      className: alb
      annotations: {}
      hosts:
        - paths:
            - path: /
              pathType: Prefix
      tls: []
    gcpIngress:
      enabled: false
      managedCertificateName: witself-api
      backendConfigName: witself-server
      frontendConfig:
        enabled: false
        name: witself-api
        redirectToHttps:
          enabled: true
          responseCodeName: PERMANENT_REDIRECT
      staticIPName: ""
      annotations: {}
      hosts:
        - paths:
            - path: /*
              pathType: ImplementationSpecific
      backendConfig:
        healthCheck:
          checkIntervalSec: 10
          timeoutSec: 5
          healthyThreshold: 1
          unhealthyThreshold: 3
          type: HTTP
          requestPath: /readyz
          port: 8081
    azureGateway:
      enabled: false
      albNamespace: azure-alb-system
      albName: witself-api
      albSubnetID: ""
      gatewayName: witself-api
      gatewayClassName: azure-alb-external
      hostname: ""
      serviceName: witself-server
      servicePort: 80
      http:
        enabled: true
      https:
        enabled: false
        certificate:
          enabled: false
          secretName: witself-api-tls
          issuerRef:
            kind: ClusterIssuer
            name: letsencrypt-prod
          acme:
            enabled: false
            email: ""
            server: https://acme-v02.api.letsencrypt.org/directory
            privateKeySecretName: letsencrypt-prod-private-key
    secrets:
      bootstrap:
        enabled: true
        remoteKeySuffix: bootstrap/operator-token
        targetName: witself-bootstrap
        tokenKey: token
        ttlKey: ttl
        mountPath: ""
        refreshInterval: 1h
        storeName: aws
      database:
        enabled: true
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h
        storeName: aws
      provision:
        # The cell's account-provisioning token (control-plane trust link).
        # Disabled by default: self-hosted cells never provision accounts.
        enabled: false
        remoteKeySuffix: provision/token
        targetName: witself-provision
        tokenKey: token
        refreshInterval: 1h
        storeName: aws

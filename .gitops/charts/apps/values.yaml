cell:
  name: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  destinationServer: https://kubernetes.default.svc

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartRepoURL: ghcr.io/witwave-ai/charts
    chartName: witself-server
    chartVersion: 0.0.45
    imageTag: 0.0.45
    backendKind: managed
    secrets:
      bootstrap:
        enabled: true
        remoteKeySuffix: bootstrap/operator-token
        targetName: witself-bootstrap
        tokenKey: token
        ttlKey: ttl
        mountPath: ""
        refreshInterval: 1h
        storeName: aws
      database:
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h
        storeName: aws

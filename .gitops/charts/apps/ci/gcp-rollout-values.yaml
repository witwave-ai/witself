# Dedicated app-of-apps rollout fixture. Keep this separate from the live cell
# overlay so clean CI validates the complete nested values contract before a
# newly published chart is pinned in production.
apps:
  witselfServer:
    replicaCount: 2
    minReadySeconds: 10
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    lifecycle:
      preStopSleepSeconds: 120
    terminationGracePeriodSeconds: 210
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        minDomains: 2
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: witself-server
            app.kubernetes.io/instance: witself-server
    worker:
      enabled: true
      replicaCount: 2
      minReadySeconds: 10
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 1
      terminationGracePeriodSeconds: 30
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: witself-worker
              app.kubernetes.io/instance: witself-server
              app.kubernetes.io/component: worker
    gcpIngress:
      backendConfig:
        connectionDraining:
          drainingTimeoutSec: 60

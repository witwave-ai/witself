cell:
  name: ""
  region: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  valuesPath: ""
  destinationServer: https://kubernetes.default.svc

platform:
  externalSecrets:
    enabled: true
    chartRepoURL: https://charts.external-secrets.io
    chartName: external-secrets
    chartVersion: 2.7.0
    namespace: external-secrets
    installCRDs: true
    storeName: aws
    secretsManagerRegion: ""

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartRepoURL: ghcr.io/witwave-ai/charts
    chartName: witself-server
    chartVersion: 0.0.42
    imageTag: 0.0.42
    backendKind: managed
    secrets:
      database:
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h

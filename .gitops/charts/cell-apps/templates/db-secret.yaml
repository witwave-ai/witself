{{- if .Values.apps.witselfServer.enabled }}
{{- $db := .Values.apps.witselfServer.secrets.database -}}
{{- $remoteKeySuffix := default "db" $db.remoteKeySuffix -}}
{{- $remoteKey := default (printf "%s/%s" (required "cell.name is required" .Values.cell.name) $remoteKeySuffix) $db.remoteKey -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ default "witself-db" $db.targetName | quote }}
  namespace: {{ .Values.apps.witselfServer.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ default "1h" $db.refreshInterval | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ default "aws" $db.storeName | quote }}
  target:
    name: {{ default "witself-db" $db.targetName | quote }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $remoteKey | quote }}
{{- end }}

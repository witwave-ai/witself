cell:
  name: ""

gitops:
  project: default
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
  destinationServer: https://kubernetes.default.svc

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartRepoURL: ghcr.io/witwave-ai/charts
    chartName: witself-server
    chartVersion: 0.0.42
    imageTag: 0.0.42
    backendKind: managed
    secrets:
      database:
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h
        storeName: aws

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: witself-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/witwave-ai/witself
    targetRevision: main
    path: charts/witself-server
    helm:
      releaseName: witself-server
      values: |
        backend:
          kind: managed
        image:
          tag: "0.0.42"
        database:
          existingSecret:
            name: witself-db
            urlKey: dsn
  destination:
    server: https://kubernetes.default.svc
    namespace: witself
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

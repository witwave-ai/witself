cell:
  name: gcp-sandbox-use1-dev
  cloud: gcp
  accountAlias: sandbox
  region: us-east1
  role: dev
  domain: gcp-sandbox-use1-dev.cells.witself.witwave.ai
  apiHost: api.gcp-sandbox-use1-dev.cells.witself.witwave.ai
gitops:
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartVersion: 0.0.194
    imageTag: 0.0.194
    factDeletionEnabled: true
    # Receive-only pilot for one internal realm. The matching Ed25519 private
    # key remains only in the isolated Cloudflare Email Worker secret.
    agentEmail:
      receivePilot:
        enabled: true
        domain: agent-mail.witwave.ai
        audience: gcp-sandbox-use1-dev
        realmID: realm_drz4xnv73ficcrko
        agentIDs:
          - agent_relncdnqkvppmg43
          - agent_aqgakfkmglnovjut
          - agent_swo3f54wmdpkzyyq
          - agent_k7mxv7zemzl7eryc
          - agent_eshphz2flzvdfnj2
          - agent_z7flki3nxargu2gl
        relayPublicKeysJSON: '{"pilot_20260721_v1":"4YFALyKdS19xyYFyoJkP1kydVKw0xlmhf92Hog5b81s="}'
        relayReplayWindow: 5m
    # Phase B enabled compaction after every schema-54-compatible v186 server
    # pod replaced the old writers.
    avatarPayloadCompactionEnabled: true
    backendKind: managed
    replicaCount: 2
    minReadySeconds: 10
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    lifecycle:
      # Keep the process serving while GKE removes its NEG endpoint and the
      # external Application Load Balancer drains established connections.
      preStopSleepSeconds: 120
    terminationGracePeriodSeconds: 210
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        minDomains: 2
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: witself-server
            app.kubernetes.io/instance: witself-server
    awsAlbIngress:
      enabled: false
    gcpIngress:
      enabled: true
      managedCertificateName: witself-api
      backendConfigName: witself-server
      backendConfig:
        connectionDraining:
          drainingTimeoutSec: 60
      frontendConfig:
        enabled: true
        name: witself-api
        redirectToHttps:
          enabled: true
          responseCodeName: PERMANENT_REDIRECT
      staticIPName: witself-gcp-sandbox-use1-dev-api
      annotations:
        external-dns.alpha.kubernetes.io/hostname: api.gcp-sandbox-use1-dev.cells.witself.witwave.ai
      hosts:
        - host: api.gcp-sandbox-use1-dev.cells.witself.witwave.ai
          paths:
            - path: /*
              pathType: ImplementationSpecific
    secrets:
      bootstrap:
        enabled: true
        remoteKey: witself-gcp-sandbox-use1-dev-bootstrap-operator-token
        targetName: witself-bootstrap
        tokenKey: token
        ttlKey: ttl
        refreshInterval: 1h
        storeName: gcp
      database:
        enabled: true
        remoteKey: witself-gcp-sandbox-use1-dev-db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h
        storeName: gcp
      provision:
        enabled: true
        remoteKey: witself-gcp-sandbox-use1-dev-provision-token
        targetName: witself-provision
        tokenKey: token
        refreshInterval: 1h
        storeName: gcp
platform:
  awsAlbIngress:
    enabled: false
  certManager:
    enabled: true
    chartVersion: v1.20.3
    namespace: cert-manager
  externalDNS:
    enabled: true
    chartVersion: 1.21.1
    namespace: external-dns
    serviceAccountName: external-dns
    serviceAccountAnnotations:
      iam.gke.io/gcp-service-account: ws-dns-gcp-sandbox-use1-dev@witself-sandbox.iam.gserviceaccount.com
    domainFilters:
      - gcp-sandbox-use1-dev.cells.witself.witwave.ai
    txtOwnerId: gcp-sandbox-use1-dev
    provider:
      name: google
    extraArgs:
      google-project: witself-sandbox
      google-zone-visibility: public
  externalSecrets:
    enabled: true
    chartVersion: 2.7.0
    namespace: external-secrets
    storeName: gcp
    serviceAccountName: external-secrets
    serviceAccountAnnotations:
      iam.gke.io/gcp-service-account: ws-eso-gcp-sandbox-use1-dev@witself-sandbox.iam.gserviceaccount.com
    gcpProjectID: witself-sandbox
  keda:
    enabled: true
    chartVersion: 2.20.1
    namespace: keda
    ignoreDeploymentResourceDifferences: true
  metricsServer:
    enabled: false
    chartVersion: 3.13.1
    namespace: kube-system
    replicas: 1

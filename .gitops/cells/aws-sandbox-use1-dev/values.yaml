cell:
  name: aws-sandbox-use1-dev
  cloud: aws
  accountAlias: sandbox
  region: us-east-1
  role: dev

gitops:
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartVersion: 0.0.42
    imageTag: 0.0.42
    backendKind: managed
    secrets:
      database:
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h

platform:
  certManager:
    enabled: true
    chartVersion: v1.20.3
    namespace: cert-manager
  externalSecrets:
    enabled: true
    chartVersion: 2.7.0
    namespace: external-secrets
    storeName: aws
    secretsManagerRegion: us-east-1
  keda:
    enabled: true
    chartVersion: 2.20.1
    namespace: keda

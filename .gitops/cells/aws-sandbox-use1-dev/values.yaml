cell:
  name: aws-sandbox-use1-dev
  cloud: aws
  accountAlias: sandbox
  region: us-east-1
  role: dev
  domain: aws-sandbox-use1-dev.cells.witself.witwave.ai
  apiHost: api.aws-sandbox-use1-dev.cells.witself.witwave.ai
gitops:
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main
apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartVersion: 0.0.167
    imageTag: 0.0.167
    backendKind: managed
    awsAlbIngress:
      enabled: true
      className: alb
      annotations:
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
        alb.ingress.kubernetes.io/ssl-redirect: "443"
        alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
        alb.ingress.kubernetes.io/healthcheck-port: "8081"
        alb.ingress.kubernetes.io/healthcheck-path: /readyz
        alb.ingress.kubernetes.io/success-codes: "200"
      hosts:
        - paths:
            - path: /
              pathType: Prefix
      tls: []
    secrets:
      bootstrap:
        enabled: true
        remoteKeySuffix: bootstrap/operator-token
        targetName: witself-bootstrap
        tokenKey: token
        ttlKey: ttl
        refreshInterval: 1h
      database:
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h
      provision:
        enabled: true
        remoteKeySuffix: provision/token
        targetName: witself-provision
        tokenKey: token
        refreshInterval: 1h
platform:
  awsAlbIngress:
    enabled: true
    className: alb
    scheme: internet-facing
    ipAddressType: ipv4
    groupName: witself-public
    listeners:
      - protocol: HTTP
        port: 80
  certManager:
    enabled: true
    chartVersion: v1.20.3
    namespace: cert-manager
  externalDNS:
    enabled: true
    chartVersion: 1.21.1
    namespace: external-dns
    serviceAccountName: external-dns
    domainFilters:
      - aws-sandbox-use1-dev.cells.witself.witwave.ai
    txtOwnerId: aws-sandbox-use1-dev
    extraArgs:
      aws-zone-type: public
  externalSecrets:
    enabled: true
    chartVersion: 2.7.0
    namespace: external-secrets
    storeName: aws
    secretsManagerRegion: us-east-1
  keda:
    enabled: true
    chartVersion: 2.20.1
    namespace: keda
  metricsServer:
    enabled: true
    chartVersion: 3.13.1
    namespace: kube-system
    replicas: 2

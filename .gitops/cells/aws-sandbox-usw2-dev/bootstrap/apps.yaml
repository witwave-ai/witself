# Application tier for aws-sandbox-usw2-dev.
#
# sync-wave 1: apps come up after platform dependencies.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/witwave-ai/witself
    targetRevision: main
    path: .gitops/cells/aws-sandbox-usw2-dev/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

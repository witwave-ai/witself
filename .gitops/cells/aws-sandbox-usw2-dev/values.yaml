cell:
  name: aws-sandbox-usw2-dev
  cloud: aws
  accountAlias: sandbox
  region: us-west-2
  role: dev

gitops:
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartVersion: 0.0.45
    imageTag: 0.0.45
    backendKind: managed
    secrets:
      bootstrap:
        enabled: true
        remoteKeySuffix: bootstrap/operator-token
        targetName: witself-bootstrap
        tokenKey: token
        ttlKey: ttl
        refreshInterval: 1h
      database:
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h

platform:
  certManager:
    enabled: true
    chartVersion: v1.20.3
    namespace: cert-manager
  externalSecrets:
    enabled: true
    chartVersion: 2.7.0
    namespace: external-secrets
    storeName: aws
    secretsManagerRegion: us-west-2
  keda:
    enabled: true
    chartVersion: 2.20.1
    namespace: keda
  metricsServer:
    enabled: true
    chartVersion: 3.13.1
    namespace: kube-system
    replicas: 2

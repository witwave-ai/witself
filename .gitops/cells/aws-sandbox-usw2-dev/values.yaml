cell:
  name: aws-sandbox-usw2-dev
  cloud: aws
  accountAlias: sandbox
  region: us-west-2
  role: dev

gitops:
  repoURL: https://github.com/witwave-ai/witself
  targetRevision: main

platform:
  externalSecrets:
    enabled: true
    chartVersion: 2.7.0
    namespace: external-secrets
    storeName: aws
    secretsManagerRegion: us-west-2
  keda:
    enabled: true
    chartVersion: 2.20.1
    namespace: keda

apps:
  witselfServer:
    enabled: true
    namespace: witself
    chartVersion: 0.0.42
    imageTag: 0.0.42
    backendKind: managed
    secrets:
      database:
        remoteKeySuffix: db
        targetName: witself-db
        urlKey: dsn
        refreshInterval: 1h

# External Secrets Operator — installed via GitOps from its upstream Helm chart.
# Argo's root `bootstrap` Application discovers this file and syncs it.
#
# This installs the operator only; it runs idle until a SecretStore +
# ExternalSecret are added (a later slice wires it to AWS Secrets Manager via a
# Pod Identity / IRSA role).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0
    helm:
      values: |
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
